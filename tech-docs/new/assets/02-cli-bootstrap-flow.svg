<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code CLI 启动与 Runtime Bootstrap 流程</title>
  <desc id="desc">展示 claude-code/src/entrypoints/cli.tsx 到 main.tsx，再分流到 headless print 或 interactive REPL 的启动链路。</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 600; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .box-title { fill: #111827; font-size: 14px; font-weight: 600; }
    .box-sub { fill: #6b7280; font-size: 12px; }
    .small { fill: #6b7280; font-size: 11px; }
    .section { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.3; stroke-dasharray: 7 5; rx: 12; ry: 12; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .red { fill: #fef2f2; stroke: #fecaca; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Claude Code CLI 启动与 Runtime Bootstrap</text>
  <text x="40" y="68" class="subtitle">路径边界：所有源码节点均来自 claude-code/，核心链路为 entrypoints/cli.tsx → main.tsx → print 或 REPL</text>

  <rect x="28" y="92" width="248" height="600" class="section"/>
  <text x="48" y="122" class="box-title">Entry Layer</text>
  <text x="48" y="142" class="small">轻启动、快速路径、延迟加载</text>

  <rect x="326" y="92" width="344" height="600" class="section"/>
  <text x="346" y="122" class="box-title">Runtime Bootstrap</text>
  <text x="346" y="142" class="small">Commander、配置、权限、setup、工具池</text>

  <rect x="720" y="92" width="420" height="600" class="section"/>
  <text x="740" y="122" class="box-title">Execution Mode</text>
  <text x="740" y="142" class="small">Headless、Interactive、Subcommands</text>

  <rect x="58" y="178" width="188" height="64" class="node blue"/>
  <text x="152" y="205" text-anchor="middle" class="box-title">Shell</text>
  <text x="152" y="225" text-anchor="middle" class="box-sub">ccb / claude-code-best</text>

  <rect x="58" y="286" width="188" height="78" class="node blue"/>
  <text x="152" y="314" text-anchor="middle" class="box-title">cli.tsx</text>
  <text x="152" y="334" text-anchor="middle" class="box-sub">performance shim</text>
  <text x="152" y="352" text-anchor="middle" class="box-sub">MACRO fallback / env</text>

  <rect x="58" y="430" width="188" height="112" class="node red"/>
  <text x="152" y="458" text-anchor="middle" class="box-title">Fast Paths</text>
  <text x="152" y="480" text-anchor="middle" class="box-sub">--version / MCP / ACP</text>
  <text x="152" y="498" text-anchor="middle" class="box-sub">daemon / remote</text>
  <text x="152" y="516" text-anchor="middle" class="box-sub">job / runner / tmux</text>

  <rect x="356" y="178" width="284" height="72" class="node purple"/>
  <text x="498" y="207" text-anchor="middle" class="box-title">dynamic import main.jsx</text>
  <text x="498" y="229" text-anchor="middle" class="box-sub">没有命中特殊路径才加载完整运行时</text>

  <rect x="356" y="292" width="284" height="76" class="node"/>
  <text x="498" y="320" text-anchor="middle" class="box-title">main.tsx</text>
  <text x="498" y="342" text-anchor="middle" class="box-sub">main() 初始化进程级运行时</text>

  <rect x="356" y="410" width="284" height="78" class="node orange"/>
  <text x="498" y="438" text-anchor="middle" class="box-title">Commander</text>
  <text x="498" y="460" text-anchor="middle" class="box-sub">preAction: init / sinks / migrations</text>
  <text x="498" y="478" text-anchor="middle" class="box-sub">root action: 参数归一化</text>

  <rect x="356" y="530" width="284" height="100" class="node green"/>
  <text x="498" y="558" text-anchor="middle" class="box-title">Bootstrap Work</text>
  <text x="498" y="580" text-anchor="middle" class="box-sub">permission context / tools</text>
  <text x="498" y="598" text-anchor="middle" class="box-sub">setup cwd / hooks / worktree</text>
  <text x="498" y="616" text-anchor="middle" class="box-sub">commands / agents / MCP config</text>

  <rect x="760" y="168" width="330" height="82" class="node red"/>
  <text x="925" y="198" text-anchor="middle" class="box-title">Subcommands</text>
  <text x="925" y="220" text-anchor="middle" class="box-sub">mcp / auth / plugin / doctor / server</text>
  <text x="925" y="238" text-anchor="middle" class="box-sub">部分在 cli.tsx 快速路径提前拦截</text>

  <rect x="760" y="316" width="330" height="96" class="node green"/>
  <text x="925" y="346" text-anchor="middle" class="box-title">Headless Print</text>
  <text x="925" y="368" text-anchor="middle" class="box-sub">src/cli/print.ts runHeadless()</text>
  <text x="925" y="386" text-anchor="middle" class="box-sub">stream-json / ask() / SDK control</text>

  <rect x="760" y="492" width="330" height="100" class="node blue"/>
  <text x="925" y="522" text-anchor="middle" class="box-title">Interactive REPL</text>
  <text x="925" y="544" text-anchor="middle" class="box-sub">replLauncher.tsx launchRepl()</text>
  <text x="925" y="562" text-anchor="middle" class="box-sub">App + REPL + Ink terminal UI</text>
  <text x="925" y="580" text-anchor="middle" class="box-sub">MCP 异步接入，不阻塞首屏</text>

  <line x1="152" y1="242" x2="152" y2="286" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M246 325 C282 325 300 214 356 214" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M152 364 L152 430" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-rose)"/>
  <line x1="498" y1="250" x2="498" y2="292" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="498" y1="368" x2="498" y2="410" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="498" y1="488" x2="498" y2="530" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M640 448 C690 448 708 209 760 209" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-rose)"/>
  <path d="M640 580 C705 580 705 364 760 364" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M640 580 C700 580 704 542 760 542" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <rect x="40" y="708" width="472" height="30" fill="#ffffff"/>
  <line x1="48" y1="724" x2="78" y2="724" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="88" y="728" class="small">主启动链路</text>
  <line x1="174" y1="724" x2="204" y2="724" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-rose)"/>
  <text x="214" y="728" class="small">快速路径 / 子命令</text>
  <line x1="356" y1="724" x2="386" y2="724" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="396" y="728" class="small">运行时准备</text>
</svg>
