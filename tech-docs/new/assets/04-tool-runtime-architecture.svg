<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" width="1280" height="820" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Tool Runtime 架构</title>
  <desc id="desc">展示 Tool 协议、工具池组装、Agent Loop、工具调度、权限执行和本地系统/MCP 的关系。</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 600; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .box-title { fill: #111827; font-size: 14px; font-weight: 600; }
    .box-sub { fill: #6b7280; font-size: 12px; }
    .small { fill: #6b7280; font-size: 11px; }
    .section { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.3; stroke-dasharray: 7 5; rx: 12; ry: 12; }
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .rose { fill: #fef2f2; stroke: #fecaca; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>

  <rect width="1280" height="820" fill="#ffffff"/>
  <text x="40" y="44" class="title">Claude Code Tool Runtime 架构</text>
  <text x="40" y="68" class="subtitle">Tool 协议把内置工具、MCP 工具、本地系统能力统一到同一条 schema → permission → call → tool_result 链路</text>

  <rect x="34" y="104" width="300" height="596" class="section"/>
  <text x="58" y="132" class="box-title">工具来源与工具池</text>
  <text x="58" y="152" class="small">tools.ts / services.mcp</text>

  <rect x="374" y="104" width="276" height="596" class="section"/>
  <text x="398" y="132" class="box-title">Agent Loop 边界</text>
  <text x="398" y="152" class="small">query.ts 只看到统一 Tools</text>

  <rect x="690" y="104" width="270" height="596" class="section"/>
  <text x="714" y="132" class="box-title">Tool Runtime</text>
  <text x="714" y="152" class="small">orchestration / execution</text>

  <rect x="1000" y="104" width="236" height="596" class="section"/>
  <text x="1024" y="132" class="box-title">执行边界</text>
  <text x="1024" y="152" class="small">local system / MCP server</text>

  <rect x="72" y="184" width="224" height="86" class="node blue"/>
  <text x="184" y="212" text-anchor="middle" class="box-title">内置工具</text>
  <text x="184" y="234" text-anchor="middle" class="box-sub">Bash / Read / Edit / Write</text>
  <text x="184" y="252" text-anchor="middle" class="box-sub">Agent / Web / Todo / Skills</text>

  <rect x="72" y="320" width="224" height="78" class="node teal"/>
  <text x="184" y="348" text-anchor="middle" class="box-title">MCP 工具</text>
  <text x="184" y="370" text-anchor="middle" class="box-sub">services/mcp/client.ts</text>
  <text x="184" y="388" text-anchor="middle" class="box-sub">tools/resources/prompts</text>

  <rect x="72" y="448" width="224" height="104" class="node green"/>
  <text x="184" y="476" text-anchor="middle" class="box-title">assembleToolPool()</text>
  <text x="184" y="498" text-anchor="middle" class="box-sub">permission deny 过滤</text>
  <text x="184" y="516" text-anchor="middle" class="box-sub">built-ins 优先</text>
  <text x="184" y="534" text-anchor="middle" class="box-sub">稳定排序 + 去重</text>

  <rect x="406" y="178" width="212" height="90" class="node purple"/>
  <text x="512" y="206" text-anchor="middle" class="box-title">Tool 协议</text>
  <text x="512" y="228" text-anchor="middle" class="box-sub">name / schema / prompt</text>
  <text x="512" y="246" text-anchor="middle" class="box-sub">call / permissions / render</text>

  <rect x="406" y="336" width="212" height="86" class="node purple"/>
  <text x="512" y="364" text-anchor="middle" class="box-title">Agent Loop</text>
  <text x="512" y="386" text-anchor="middle" class="box-sub">assistant tool_use</text>
  <text x="512" y="404" text-anchor="middle" class="box-sub">tool_result 回灌</text>

  <rect x="406" y="500" width="212" height="86" class="node orange"/>
  <text x="512" y="528" text-anchor="middle" class="box-title">ToolUseContext</text>
  <text x="512" y="550" text-anchor="middle" class="box-sub">AppState / mcpClients</text>
  <text x="512" y="568" text-anchor="middle" class="box-sub">abort / read cache / trace</text>

  <rect x="724" y="184" width="202" height="90" class="node orange"/>
  <text x="825" y="212" text-anchor="middle" class="box-title">runTools()</text>
  <text x="825" y="234" text-anchor="middle" class="box-sub">按 isConcurrencySafe 分批</text>
  <text x="825" y="252" text-anchor="middle" class="box-sub">并发安全并行，其他串行</text>

  <rect x="724" y="344" width="202" height="108" class="node rose"/>
  <text x="825" y="372" text-anchor="middle" class="box-title">runToolUse()</text>
  <text x="825" y="394" text-anchor="middle" class="box-sub">find tool / validate input</text>
  <text x="825" y="412" text-anchor="middle" class="box-sub">pre hooks / canUseTool</text>
  <text x="825" y="430" text-anchor="middle" class="box-sub">tool.call / post hooks</text>

  <rect x="724" y="526" width="202" height="86" class="node green"/>
  <text x="825" y="554" text-anchor="middle" class="box-title">tool_result</text>
  <text x="825" y="576" text-anchor="middle" class="box-sub">mapToolResultToBlock</text>
  <text x="825" y="594" text-anchor="middle" class="box-sub">UserMessage 回到模型</text>

  <rect x="1032" y="192" width="172" height="82" class="node blue"/>
  <text x="1118" y="220" text-anchor="middle" class="box-title">本地系统</text>
  <text x="1118" y="242" text-anchor="middle" class="box-sub">FS / shell / git</text>
  <text x="1118" y="260" text-anchor="middle" class="box-sub">IDE / LSP / browser</text>

  <rect x="1032" y="388" width="172" height="82" class="node teal"/>
  <text x="1118" y="416" text-anchor="middle" class="box-title">MCP Server</text>
  <text x="1118" y="438" text-anchor="middle" class="box-sub">stdio / HTTP / SSE</text>
  <text x="1118" y="456" text-anchor="middle" class="box-sub">auth / resources</text>

  <rect x="1032" y="556" width="172" height="72" class="node rose"/>
  <text x="1118" y="584" text-anchor="middle" class="box-title">安全边界</text>
  <text x="1118" y="606" text-anchor="middle" class="box-sub">schema + permission + hooks</text>

  <path d="M296 227 C338 286 338 454 296 500" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <line x1="184" y1="398" x2="184" y2="448" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
  <path d="M296 500 C344 500 356 223 406 223" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <line x1="512" y1="268" x2="512" y2="336" stroke="#9333ea" stroke-width="2" marker-end="url(#arr-purple)"/>
  <line x1="512" y1="422" x2="512" y2="500" stroke="#9333ea" stroke-width="2" marker-end="url(#arr-purple)"/>
  <path d="M618 379 C664 379 676 229 724 229" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arr-blue)"/>
  <line x1="825" y1="274" x2="825" y2="344" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-rose)"/>
  <line x1="825" y1="452" x2="825" y2="526" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
  <path d="M926 398 C972 398 988 233 1032 233" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arr-rose)"/>
  <path d="M926 398 C972 398 988 429 1032 429" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arr-rose)"/>
  <path d="M1032 592 C970 592 954 570 926 570" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>
  <path d="M724 570 C660 570 644 379 618 379" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>

  <rect x="48" y="748" width="660" height="34" fill="#ffffff"/>
  <line x1="60" y1="766" x2="90" y2="766" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="102" y="770" class="small">工具暴露给模型</text>
  <line x1="228" y1="766" x2="258" y2="766" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-rose)"/>
  <text x="270" y="770" class="small">执行前安全链路</text>
  <line x1="424" y1="766" x2="454" y2="766" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="466" y="770" class="small">结果回灌模型</text>
</svg>
