  <path d="M636 637 C692 637 728 373 784 373" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M636 637 C692 637 728 493 784 493" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arr-vlt)"/>
  <path d="M986 637 C1036 637 1084 637 1134 637" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arr-rose)"/>

  <path d="M986 253 C1036 253 1084 253 1134 253" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M986 373 C1036 373 1084 373 1134 373" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M986 493 C1036 493 1084 493 1134 493" stroke="#9333ea" stroke-width="2.2" fill="none" marker-end="url(#arr-vlt)"/>
  <path d="M1235 292 C1235 314 1235 314 1235 334" stroke="#2563eb" stroke-width="2.2" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M1235 412 C1235 434 1235 434 1235 454" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arr-grn)"/>

  <g transform="translate(58, 838)">
    <line x1="0" y1="0" x2="42" y2="0" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arr-blue)"/>
    <text class="small" x="54" y="5">配置与工具主链路</text>
    <line x1="230" y1="0" x2="272" y2="0" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arr-grn)"/>
    <text class="small" x="284" y="5">已授权能力路径</text>
    <line x1="470" y1="0" x2="512" y2="0" stroke="#9333ea" stroke-width="2.2" marker-end="url(#arr-vlt)"/>
    <text class="small" x="524" y="5">资源与按需读取</text>
    <line x1="700" y1="0" x2="742" y2="0" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arr-rose)"/>
    <text class="small" x="754" y="5">认证 / 通知 / 异步边界</text>
