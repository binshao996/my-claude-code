<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 28px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 16px; }
    .lane-title { fill: #111827; font-size: 16px; font-weight: 700; }
    .lane-sub { fill: #6b7280; font-size: 13px; }
    .node-title { fill: #111827; font-size: 16px; font-weight: 700; }
    .node-sub { fill: #6b7280; font-size: 13px; }
    .small { fill: #6b7280; font-size: 12px; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arr-grn" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arr-rose" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#dc2626"/>
    </marker>
    <marker id="arr-vlt" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="1440" height="900" fill="#ffffff"/>

  <text class="title" x="44" y="54">MCP Capability Runtime</text>
  <text class="subtitle" x="44" y="84">从多来源配置到 transport 连接，再把 tools / prompts / resources 转成 Claude Code 内部能力</text>

  <rect x="42" y="126" width="286" height="650" rx="10" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="8 8"/>
  <text class="lane-title" x="70" y="164">Config Pipeline</text>
  <text class="lane-sub" x="70" y="188">config.ts</text>

  <rect x="392" y="126" width="286" height="650" rx="10" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="8 8"/>
  <text class="lane-title" x="420" y="164">Connection Runtime</text>
  <text class="lane-sub" x="420" y="188">client.ts / useManageMCPConnections.ts</text>

  <rect x="742" y="126" width="286" height="650" rx="10" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="8 8"/>
  <text class="lane-title" x="770" y="164">Capability Adapter</text>
  <text class="lane-sub" x="770" y="188">tools / prompts / resources</text>

  <rect x="1092" y="126" width="286" height="650" rx="10" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="8 8"/>
  <text class="lane-title" x="1120" y="164">Agent Runtime</text>
  <text class="lane-sub" x="1120" y="188">AppState / Tool Runtime / Prompt</text>

  <rect x="84" y="232" width="202" height="78" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6"/>
  <text class="node-title" x="185" y="264" text-anchor="middle">Config Sources</text>
  <text class="node-sub" x="185" y="288" text-anchor="middle">user / project / local</text>

  <rect x="84" y="354" width="202" height="78" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6"/>
  <text class="node-title" x="185" y="386" text-anchor="middle">Policy Gate</text>
  <text class="node-sub" x="185" y="410" text-anchor="middle">allowlist / denylist</text>

  <rect x="84" y="476" width="202" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6"/>
  <text class="node-title" x="185" y="508" text-anchor="middle">Dedup</text>
  <text class="node-sub" x="185" y="532" text-anchor="middle">manual / plugin / claude.ai</text>

  <rect x="84" y="598" width="202" height="78" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6"/>
  <text class="node-title" x="185" y="630" text-anchor="middle">Scoped Configs</text>
  <text class="node-sub" x="185" y="654" text-anchor="middle">enterprise / dynamic / approved</text>

