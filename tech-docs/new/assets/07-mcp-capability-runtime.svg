  <path d="M535 422 C535 446 535 452 535 476" stroke="#dc2626" stroke-width="2.2" fill="none" marker-end="url(#arr-rose)"/>
  <path d="M535 554 C535 574 535 578 535 598" stroke="#16a34a" stroke-width="2.2" fill="none" marker-end="url(#arr-grn)"/>

