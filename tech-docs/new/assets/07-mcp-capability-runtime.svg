  <text class="node-sub" x="535" y="390" text-anchor="middle">stdio / http / sse / ws</text>
  <text class="node-sub" x="535" y="410" text-anchor="middle">sdk / claude.ai proxy</text>

  <rect x="434" y="476" width="202" height="78" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6"/>
