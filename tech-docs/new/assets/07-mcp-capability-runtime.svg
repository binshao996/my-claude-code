  <text class="node-sub" x="535" y="532" text-anchor="middle">needs-auth / refresh</text>

  <rect x="434" y="598" width="202" height="78" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6"/>
  <text class="node-title" x="535" y="630" text-anchor="middle">Connected Client</text>
  <text class="node-sub" x="535" y="654" text-anchor="middle">capabilities + instructions</text>

  <rect x="784" y="214" width="202" height="78" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6"/>
  <text class="node-title" x="885" y="246" text-anchor="middle">Tools Adapter</text>
  <text class="node-sub" x="885" y="270" text-anchor="middle">MCP tool -> Tool</text>

  <rect x="784" y="334" width="202" height="78" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6"/>
  <text class="node-title" x="885" y="366" text-anchor="middle">Prompts Adapter</text>
  <text class="node-sub" x="885" y="390" text-anchor="middle">MCP prompt -> command</text>

  <rect x="784" y="454" width="202" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6"/>
  <text class="node-title" x="885" y="486" text-anchor="middle">Resources Adapter</text>
  <text class="node-sub" x="885" y="510" text-anchor="middle">list / read resource tools</text>

  <rect x="784" y="598" width="202" height="78" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.6"/>
  <text class="node-title" x="885" y="630" text-anchor="middle">list_changed</text>
  <text class="node-sub" x="885" y="654" text-anchor="middle">refresh caches + AppState</text>

  <rect x="1134" y="214" width="202" height="78" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.6"/>
  <text class="node-title" x="1235" y="246" text-anchor="middle">AppState.mcp</text>
  <text class="node-sub" x="1235" y="270" text-anchor="middle">clients / tools / commands</text>

  <rect x="1134" y="334" width="202" height="78" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.6"/>
  <text class="node-title" x="1235" y="366" text-anchor="middle">Tool Runtime</text>
  <text class="node-sub" x="1235" y="390" text-anchor="middle">permission + execution</text>

  <rect x="1134" y="454" width="202" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.6"/>
  <text class="node-title" x="1235" y="486" text-anchor="middle">Prompt Pipeline</text>
  <text class="node-sub" x="1235" y="510" text-anchor="middle">schema + instructions</text>

  <rect x="1134" y="598" width="202" height="78" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.6"/>
  <text class="node-title" x="1235" y="630" text-anchor="middle">Channel Queue</text>
  <text class="node-sub" x="1235" y="654" text-anchor="middle">inbound notifications</text>

