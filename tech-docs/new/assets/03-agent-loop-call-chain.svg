<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 820" width="1180" height="820" role="img" aria-labelledby="title desc">
  <title id="title">Agent Loop 调用时序</title>
  <desc id="desc">展示 REPL 或 headless 入口如何经过 QueryEngine、query.ts、模型、工具调度、权限和工具实现完成一轮 Agent Loop。</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { fill: #111827; font-size: 22px; font-weight: 600; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .label { fill: #111827; font-size: 13px; font-weight: 600; }
    .msg { fill: #374151; font-size: 12px; }
    .small { fill: #6b7280; font-size: 11px; }
    .head { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .rose { fill: #fef2f2; stroke: #fecaca; }
    .life { stroke: #d1d5db; stroke-width: 1.2; stroke-dasharray: 6 6; }
    .act { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1; rx: 4; ry: 4; }
  </style>
  <defs>
    <marker id="seq-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="seq-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="seq-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="seq-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1180" height="820" fill="#ffffff"/>
  <text x="38" y="44" class="title">Agent Loop 调用时序</text>
  <text x="38" y="68" class="subtitle">从 REPL/headless 提交输入，到模型产生 tool_use，再到工具结果回灌下一轮模型调用</text>

  <rect x="42" y="104" width="150" height="58" class="head blue"/>
  <text x="117" y="128" text-anchor="middle" class="label">入口层</text>
  <text x="117" y="148" text-anchor="middle" class="small">REPL / print</text>

  <rect x="240" y="104" width="150" height="58" class="head green"/>
  <text x="315" y="128" text-anchor="middle" class="label">QueryEngine</text>
  <text x="315" y="148" text-anchor="middle" class="small">submitMessage</text>

  <rect x="438" y="104" width="150" height="58" class="head purple"/>
  <text x="513" y="128" text-anchor="middle" class="label">query.ts</text>
  <text x="513" y="148" text-anchor="middle" class="small">queryLoop</text>

  <rect x="636" y="104" width="150" height="58" class="head purple"/>
  <text x="711" y="128" text-anchor="middle" class="label">Model</text>
  <text x="711" y="148" text-anchor="middle" class="small">callModel</text>

  <rect x="834" y="104" width="150" height="58" class="head orange"/>
  <text x="909" y="128" text-anchor="middle" class="label">Tool Runtime</text>
  <text x="909" y="148" text-anchor="middle" class="small">runTools</text>

  <rect x="1032" y="104" width="110" height="58" class="head rose"/>
  <text x="1087" y="128" text-anchor="middle" class="label">System</text>
  <text x="1087" y="148" text-anchor="middle" class="small">FS / Bash / MCP</text>

  <line x1="117" y1="162" x2="117" y2="766" class="life"/>
  <line x1="315" y1="162" x2="315" y2="766" class="life"/>
  <line x1="513" y1="162" x2="513" y2="766" class="life"/>
  <line x1="711" y1="162" x2="711" y2="766" class="life"/>
  <line x1="909" y1="162" x2="909" y2="766" class="life"/>
  <line x1="1087" y1="162" x2="1087" y2="766" class="life"/>

  <rect x="307" y="198" width="16" height="474" class="act"/>
  <rect x="505" y="282" width="16" height="372" class="act"/>
  <rect x="703" y="370" width="16" height="86" class="act"/>
  <rect x="901" y="500" width="16" height="96" class="act"/>
  <rect x="1079" y="536" width="16" height="44" class="act"/>

  <line x1="117" y1="210" x2="307" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#seq-blue)"/>
  <text x="136" y="202" class="msg">用户输入 / stdin / SDK stream</text>

  <line x1="323" y1="258" x2="505" y2="258" stroke="#16a34a" stroke-width="2" marker-end="url(#seq-green)"/>
  <text x="340" y="250" class="msg">processUserInput + transcript</text>

  <line x1="323" y1="306" x2="505" y2="306" stroke="#16a34a" stroke-width="2" marker-end="url(#seq-green)"/>
  <text x="340" y="298" class="msg">query({ messages, prompt, context, tools })</text>

  <line x1="521" y1="354" x2="703" y2="354" stroke="#9333ea" stroke-width="2" marker-end="url(#seq-purple)"/>
  <text x="538" y="346" class="msg">上下文治理后调用模型</text>

  <line x1="703" y1="408" x2="521" y2="408" stroke="#9333ea" stroke-width="2" marker-end="url(#seq-purple)"/>
  <text x="538" y="400" class="msg">assistant stream blocks</text>

  <rect x="470" y="430" width="486" height="54" fill="none" stroke="#d1d5db" stroke-dasharray="6 5" rx="8" ry="8"/>
  <text x="486" y="452" class="small">loop frame：如果流中包含 tool_use，queryLoop 不结束，而是进入工具执行</text>
  <text x="486" y="470" class="small">如果没有 tool_use，执行 stop hooks 后返回 completed</text>

  <line x1="521" y1="512" x2="901" y2="512" stroke="#16a34a" stroke-width="2" marker-end="url(#seq-green)"/>
  <text x="540" y="504" class="msg">runTools(toolUseBlocks)</text>

  <line x1="917" y1="548" x2="1079" y2="548" stroke="#dc2626" stroke-width="2" marker-end="url(#seq-rose)"/>
  <text x="930" y="540" class="msg">权限 / hooks / tool.call</text>

  <line x1="1079" y1="584" x2="917" y2="584" stroke="#dc2626" stroke-width="2" marker-end="url(#seq-rose)"/>
  <text x="946" y="576" class="msg">tool result / progress</text>

  <line x1="901" y1="620" x2="521" y2="620" stroke="#16a34a" stroke-width="2" marker-end="url(#seq-green)"/>
  <text x="546" y="612" class="msg">tool_result messages + updated ToolUseContext</text>

  <path d="M505 650 C430 700 650 738 703 456" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#seq-blue)"/>
  <rect x="548" y="666" width="318" height="26" fill="#ffffff" opacity="0.95"/>
  <text x="558" y="684" class="msg">next turn：messages += assistant + tool_results</text>

  <line x1="505" y1="744" x2="323" y2="744" stroke="#2563eb" stroke-width="2" marker-end="url(#seq-blue)"/>
  <rect x="334" y="714" width="268" height="26" fill="#ffffff" opacity="0.95"/>
  <text x="344" y="732" class="msg">SDK/UI 消息输出与 transcript 更新</text>
</svg>
