<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 780" width="1120" height="780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .lane-title { font-size: 14px; font-weight: 700; fill: #374151; }
    .node-title { font-size: 14px; font-weight: 700; fill: #111827; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 12px; fill: #374151; }
    .legend { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="136%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1120" height="780" fill="#ffffff"/>
  <text x="36" y="42" class="title">Prompt Cache Prefix Runtime：稳定前缀、稳定 cache key</text>
  <text x="36" y="65" class="subtitle">claude.ts 在请求前把 system、tools、messages、betas 与 cache_control 组织成尽量稳定的 API payload</text>

  <g transform="translate(34,98)">
    <rect x="0" y="0" width="215" height="575" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="22" y="30" class="lane-title">缓存输入</text>

    <rect x="28" y="56" width="160" height="78" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
    <text x="48" y="84" class="node-title">System Prompt</text>
    <text x="48" y="106" class="node-sub">static + dynamic sections</text>
    <text x="48" y="124" class="mono">getSystemPrompt()</text>

    <rect x="28" y="164" width="160" height="78" rx="8" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
    <text x="48" y="192" class="node-title">Tool Schemas</text>
    <text x="48" y="214" class="node-sub">built-in / MCP / agents</text>
    <text x="48" y="232" class="mono">toolToAPISchema()</text>

    <rect x="28" y="272" width="160" height="78" rx="8" fill="#f0fdfa" stroke="#ccfbf1" filter="url(#shadow)"/>
    <text x="48" y="300" class="node-title">Message Prefix</text>
    <text x="48" y="322" class="node-sub">history after boundary</text>
    <text x="48" y="340" class="mono">messagesForAPI</text>

    <rect x="28" y="380" width="160" height="78" rx="8" fill="#faf5ff" stroke="#e9d5ff" filter="url(#shadow)"/>
    <text x="48" y="408" class="node-title">Runtime Flags</text>
    <text x="48" y="430" class="node-sub">model / betas / source</text>
    <text x="48" y="448" class="mono">querySource</text>
  </g>

  <g transform="translate(292,98)">
    <rect x="0" y="0" width="235" height="575" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="22" y="30" class="lane-title">稳定化策略</text>

    <rect x="30" y="50" width="175" height="86" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="50" y="80" class="node-title">Section Cache</text>
    <text x="50" y="102" class="node-sub">按 section name 缓存</text>
    <text x="50" y="120" class="mono">systemPromptSection()</text>

    <rect x="30" y="158" width="175" height="96" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="50" y="188" class="node-title">Static / Dynamic</text>
    <text x="50" y="210" class="node-sub">边界前可全局缓存</text>
    <text x="50" y="228" class="mono">splitSysPromptPrefix()</text>

    <rect x="30" y="276" width="175" height="88" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="50" y="306" class="node-title">Tool Schema Cache</text>
    <text x="50" y="328" class="node-sub">锁定描述和 schema 字节</text>
    <text x="50" y="346" class="mono">toolSchemaCache</text>

    <rect x="30" y="386" width="175" height="96" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="50" y="416" class="node-title">Sticky Latches</text>
    <text x="50" y="438" class="node-sub">TTL / beta header 稳定</text>
    <text x="50" y="456" class="mono">bootstrap/state.ts</text>
  </g>

  <g transform="translate(576,98)">
    <rect x="0" y="0" width="235" height="575" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="22" y="30" class="lane-title">API Payload</text>

    <rect x="30" y="50" width="175" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
    <text x="50" y="80" class="node-title">System Blocks</text>
    <text x="50" y="102" class="node-sub">org / global / none</text>
    <text x="50" y="120" class="mono">cache_control</text>

    <rect x="30" y="168" width="175" height="84" rx="8" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
    <text x="50" y="198" class="node-title">Filtered Tools</text>
    <text x="50" y="220" class="node-sub">deferred tools 不进数组</text>
    <text x="50" y="238" class="mono">filteredTools</text>

    <rect x="30" y="280" width="175" height="88" rx="8" fill="#f0fdfa" stroke="#ccfbf1" filter="url(#shadow)"/>
    <text x="50" y="310" class="node-title">One Marker</text>
    <text x="50" y="332" class="node-sub">只放一个 message marker</text>
    <text x="50" y="350" class="mono">addCacheBreakpoints()</text>

    <rect x="30" y="396" width="175" height="84" rx="8" fill="#faf5ff" stroke="#e9d5ff" filter="url(#shadow)"/>
    <text x="50" y="426" class="node-title">Fork Suffix</text>
    <text x="50" y="448" class="node-sub">临时请求少写 cache</text>
    <text x="50" y="466" class="mono">skipCacheWrite</text>
  </g>

  <g transform="translate(864,98)">
    <rect x="0" y="0" width="222" height="575" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="22" y="30" class="lane-title">运行结果</text>

    <rect x="28" y="66" width="166" height="84" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="48" y="96" class="node-title">Cache Read</text>
    <text x="48" y="118" class="node-sub">前缀命中，低延迟低成本</text>
    <text x="48" y="136" class="mono">cache_read_tokens</text>

    <rect x="28" y="190" width="166" height="84" rx="8" fill="#fee2e2" stroke="#fecaca" filter="url(#shadow)"/>
    <text x="48" y="220" class="node-title">Cache Creation</text>
    <text x="48" y="242" class="node-sub">前缀变化，重新写入</text>
    <text x="48" y="260" class="mono">cache_creation</text>

    <rect x="28" y="314" width="166" height="84" rx="8" fill="#ede9fe" stroke="#ddd6fe" filter="url(#shadow)"/>
    <text x="48" y="344" class="node-title">Fork Sharing</text>
    <text x="48" y="366" class="node-sub">compact / suggestion 复用前缀</text>
    <text x="48" y="384" class="mono">runForkedAgent()</text>

    <rect x="28" y="438" width="166" height="84" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
    <text x="48" y="468" class="node-title">Observability</text>
    <text x="48" y="490" class="node-sub">状态栏、/context、日志</text>
    <text x="48" y="508" class="mono">usage fields</text>
  </g>

  <path d="M222 195 C255 195 255 155 322 93" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M222 203 C250 203 255 206 322 206" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M222 311 C255 311 255 320 322 320" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M222 419 C255 419 255 434 322 434" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M497 93 C535 93 548 95 606 95" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M497 206 C535 206 548 95 606 95" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M497 320 C538 320 550 210 606 210" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M497 434 C538 434 550 324 606 324" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M781 95 C824 95 824 108 892 108" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M781 210 C825 210 825 232 892 232" stroke="#dc2626" stroke-width="2" fill="none" stroke-dasharray="6 5" marker-end="url(#arrow-red)"/>
  <path d="M781 324 C824 324 824 356 892 356" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M781 438 C824 438 824 480 892 480" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>

  <rect x="36" y="706" width="1048" height="44" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <line x1="70" y1="728" x2="104" y2="728" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="116" y="732" class="legend">请求构造路径</text>
  <line x1="244" y1="728" x2="278" y2="728" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="290" y="732" class="legend">稳定前缀策略</text>
  <line x1="442" y1="728" x2="476" y2="728" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="488" y="732" class="legend">fork / 观测复用</text>
  <line x1="676" y1="728" x2="710" y2="728" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-red)"/>
  <text x="722" y="732" class="legend">前缀变化会触发 cache creation</text>
</svg>
