<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="ttl desc">
  <title id="ttl">第 10 章图 1：Shell 执行运行时链路</title>
  <desc id="desc">Claude Code 中 BashTool、PowerShellTool、Sandbox、ShellProvider、ShellCommand、TaskOutput 与后台任务之间的执行链路。</desc>
  <defs>
    <marker id="arr-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr-grn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arr-rose" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#e11d48"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .lane { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; }
      .lane-title { font: 700 19px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .box-blue { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .box-green { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .box-amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; }
      .box-rose { fill: #fff1f2; stroke: #fb7185; stroke-width: 2; }
      .box-violet { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 2; }
      .box-slate { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .step { font: 700 20px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .txt { font: 400 16px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .mono { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #1e293b; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arr-blue); }
      .arrow-g { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arr-grn); }
      .arrow-r { fill: none; stroke: #e11d48; stroke-width: 3; marker-end: url(#arr-rose); }
      .bus-r { fill: none; stroke: #e11d48; stroke-width: 3; }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1040"/>
  <text class="title" x="64" y="64">Shell 执行运行时链路</text>
  <text class="sub" x="64" y="96">从模型工具调用或用户输入，到沙箱包装、进程执行、输出持久化、后台任务与最终 Tool Result。</text>

  <rect class="lane" x="50" y="130" width="1500" height="190" rx="14"/>
  <text class="lane-title" x="72" y="162">入口层：谁发起命令</text>

  <rect class="box-blue" x="82" y="190" width="285" height="88" rx="10"/>
  <text class="step" x="106" y="222">模型工具调用</text>
  <text class="txt" x="106" y="250">BashTool / PowerShellTool</text>

  <rect class="box-blue" x="438" y="190" width="285" height="88" rx="10"/>
  <text class="step" x="462" y="222">用户 ! 命令</text>
  <text class="txt" x="462" y="250">processBashCommand</text>

  <rect class="box-blue" x="794" y="190" width="285" height="88" rx="10"/>
  <text class="step" x="818" y="222">Prompt 内嵌命令</text>
  <text class="txt" x="818" y="250">inline !cmd 与 block</text>

  <rect class="box-slate" x="1150" y="190" width="285" height="88" rx="10"/>
  <text class="step" x="1174" y="222">工具输入字段</text>
  <text class="mono" x="1174" y="250">command timeout background</text>

  <path class="arrow" d="M367 234 H438"/>
  <path class="arrow" d="M723 234 H794"/>
  <path class="arrow" d="M1079 234 H1150"/>

  <rect class="lane" x="50" y="350" width="1500" height="214" rx="14"/>
  <text class="lane-title" x="72" y="382">工具治理层：命令还没有进入系统 Shell</text>

  <rect class="box-amber" x="82" y="416" width="250" height="102" rx="10"/>
  <text class="step" x="106" y="448">输入校验</text>
  <text class="txt" x="106" y="476">schema、sleep 防挂起</text>
  <text class="small" x="106" y="500">直接 call 也要兜底检查</text>

  <rect class="box-amber" x="386" y="416" width="250" height="102" rx="10"/>
  <text class="step" x="410" y="448">权限判定</text>
  <text class="txt" x="410" y="476">规则、AST、路径、语义</text>
  <text class="small" x="410" y="500">deny / ask / allow</text>

  <rect class="box-violet" x="690" y="416" width="250" height="102" rx="10"/>
  <text class="step" x="714" y="448">沙箱决策</text>
  <text class="txt" x="714" y="476">shouldUseSandbox</text>
  <text class="small" x="714" y="500">排除命令不是安全边界</text>

  <rect class="box-green" x="994" y="416" width="250" height="102" rx="10"/>
  <text class="step" x="1018" y="448">ShellProvider</text>
  <text class="txt" x="1018" y="476">bash snapshot / pwsh</text>
  <text class="small" x="1018" y="500">构造 cwd 跟踪命令</text>

  <rect class="box-green" x="1298" y="416" width="190" height="102" rx="10"/>
  <text class="step" x="1322" y="448">exec</text>
  <text class="txt" x="1322" y="476">组装 env / cwd</text>
  <text class="small" x="1322" y="500">准备输出通道</text>

  <path class="arrow" d="M332 467 H386"/>
  <path class="arrow" d="M636 467 H690"/>
  <path class="arrow" d="M940 467 H994"/>
  <path class="arrow" d="M1244 467 H1298"/>

  <rect class="lane" x="50" y="594" width="1500" height="190" rx="14"/>
  <text class="lane-title" x="72" y="626">执行隔离层：把命令变成受治理的子进程</text>

  <rect class="box-violet" x="82" y="662" width="300" height="82" rx="10"/>
  <text class="step" x="106" y="694">SandboxManager</text>
  <text class="txt" x="106" y="722">文件系统、网络、代理、临时目录</text>

  <rect class="box-green" x="450" y="662" width="300" height="82" rx="10"/>
  <text class="step" x="474" y="694">child_process.spawn</text>
  <text class="txt" x="474" y="722">Shell 二进制、args、env、stdio</text>

  <rect class="box-rose" x="818" y="662" width="300" height="82" rx="10"/>
  <text class="step" x="842" y="694">ShellCommand</text>
  <text class="txt" x="842" y="722">timeout、abort、kill、background</text>

  <rect class="box-rose" x="1186" y="662" width="300" height="82" rx="10"/>
  <text class="step" x="1210" y="694">TaskOutput</text>
  <text class="txt" x="1210" y="722">文件模式、管道模式、tail、spill</text>

  <path class="arrow-g" d="M382 703 H450"/>
  <path class="arrow-g" d="M750 703 H818"/>
  <path class="arrow-g" d="M1118 703 H1186"/>

  <path class="arrow dash" d="M1393 518 V662"/>
  <path class="arrow dash" d="M232 662 V518"/>

  <rect class="lane" x="50" y="814" width="1500" height="160" rx="14"/>
  <text class="lane-title" x="72" y="846">结果层：返回给模型、UI 或后台任务</text>

  <rect class="box" x="82" y="884" width="252" height="62" rx="10"/>
  <text class="step" x="106" y="918">inline result</text>
  <text class="small" x="106" y="940">stdout / stderr / exit code</text>

  <rect class="box" x="382" y="884" width="252" height="62" rx="10"/>
  <text class="step" x="406" y="918">persisted output</text>
  <text class="small" x="406" y="940">大输出写入 tool-results</text>

  <rect class="box" x="682" y="884" width="252" height="62" rx="10"/>
  <text class="step" x="706" y="918">LocalShellTask</text>
  <text class="small" x="706" y="940">后台任务与通知</text>

  <rect class="box" x="982" y="884" width="252" height="62" rx="10"/>
  <text class="step" x="1006" y="918">cwd hooks</text>
  <text class="small" x="1006" y="940">更新工作目录与环境缓存</text>

  <rect class="box" x="1282" y="884" width="206" height="62" rx="10"/>
  <text class="step" x="1306" y="918">Tool Result</text>
  <text class="small" x="1306" y="940">回到 Agent Loop</text>

  <path class="bus-r" d="M600 744 V858"/>
  <path class="bus-r" d="M968 744 V858"/>
  <path class="bus-r" d="M1336 744 V858"/>
  <path class="bus-r" d="M208 858 H1385"/>
  <path class="arrow-r" d="M208 858 V884"/>
  <path class="arrow-r" d="M508 858 V884"/>
  <path class="arrow-r" d="M808 858 V884"/>
  <path class="arrow-r" d="M1108 858 V884"/>
  <path class="arrow-r" d="M1385 858 V884"/>
</svg>
