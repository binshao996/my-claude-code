<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Daemon and Background Session Runtime</title>
  <desc id="desc">Claude Code daemon command, background session engines, session registry, attach logs and kill lifecycle.</desc>
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
    }
    .title { font-size: 22px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .lane { font-size: 13px; font-weight: 600; fill: #374151; }
    .node-title { font-size: 14px; font-weight: 600; fill: #111827; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .small { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Daemon 与 Background Session 本地生命周期</text>
  <text x="40" y="67" class="subtitle">CLI fast-path -&gt; daemon/bg command -&gt; engine spawn -&gt; PID registry -&gt; attach/logs/kill/status</text>

  <rect x="40" y="96" width="220" height="500" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="292" y="96" width="260" height="500" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="584" y="96" width="260" height="500" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="876" y="96" width="220" height="500" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>

  <text x="62" y="124" class="lane">1. 用户入口</text>
  <text x="314" y="124" class="lane">2. 本地 session engine</text>
  <text x="606" y="124" class="lane">3. 进程注册与状态</text>
  <text x="898" y="124" class="lane">4. 管理动作</text>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="158" width="160" height="82" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="94" cy="187" r="12" fill="#2563eb"/>
    <path d="M88 187h12M94 181v12" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="116" y="183" class="node-title">entrypoints/cli</text>
    <text x="116" y="205" class="node-sub">daemon fast-path</text>
    <text x="116" y="223" class="node-sub">--bg shortcut</text>

    <rect x="70" y="286" width="160" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="94" y="313" class="node-title">daemonMain</text>
    <text x="94" y="335" class="node-sub">status/start/stop</text>
    <text x="94" y="353" class="node-sub">bg/attach/logs/kill</text>

    <rect x="70" y="414" width="160" height="82" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <text x="94" y="441" class="node-title">/daemon command</text>
    <text x="94" y="463" class="node-sub">local-jsx wrapper</text>
    <text x="94" y="481" class="node-sub">capture console output</text>

    <rect x="326" y="148" width="190" height="82" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="350" y="175" class="node-title">selectEngine</text>
    <text x="350" y="197" class="node-sub">Windows: detached</text>
    <text x="350" y="215" class="node-sub">Unix: tmux else detached</text>

    <rect x="326" y="268" width="190" height="90" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="350" y="295" class="node-title">TmuxEngine</text>
    <text x="350" y="317" class="node-sub">interactive TTY</text>
    <text x="350" y="335" class="node-sub">tmux attach-session</text>

    <rect x="326" y="396" width="190" height="90" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="350" y="423" class="node-title">DetachedEngine</text>
    <text x="350" y="445" class="node-sub">no interactive stdin</text>
    <text x="350" y="463" class="node-sub">tail log on attach</text>

    <rect x="618" y="146" width="190" height="90" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="642" y="173" class="node-title">registerSession</text>
    <text x="642" y="195" class="node-sub">~/.claude/sessions</text>
    <text x="642" y="213" class="node-sub">&lt;pid&gt;.json registry</text>

    <rect x="618" y="274" width="190" height="90" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
    <text x="642" y="301" class="node-title">updateSessionActivity</text>
    <text x="642" y="323" class="node-sub">busy / idle / waiting</text>
    <text x="642" y="341" class="node-sub">waitingFor + updatedAt</text>

    <rect x="618" y="402" width="190" height="90" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="642" y="429" class="node-title">stale cleanup</text>
    <text x="642" y="451" class="node-sub">probe PID liveness</text>
    <text x="642" y="469" class="node-sub">remove dead pid files</text>

    <rect x="910" y="146" width="154" height="78" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="173" class="node-title">status / ps</text>
    <text x="932" y="195" class="node-sub">daemon + sessions</text>

    <rect x="910" y="268" width="154" height="78" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="295" class="node-title">attach</text>
    <text x="932" y="317" class="node-sub">tmux or tailLog</text>

    <rect x="910" y="390" width="154" height="78" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="417" class="node-title">logs</text>
    <text x="932" y="439" class="node-sub">read logPath</text>

    <rect x="910" y="510" width="154" height="78" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="932" y="537" class="node-title">kill / stop</text>
    <text x="932" y="559" class="node-sub">SIGTERM then SIGKILL</text>
  </g>

  <path d="M230 199 C270 199 286 327 70 327" stroke="#2563eb" stroke-width="1.8" fill="none" opacity="0"/>
  <path d="M150 240 L150 286" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M150 368 L150 414" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M230 327 C274 327 282 189 326 189" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M421 230 L421 268" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M421 358 L421 396" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M516 313 C560 313 574 191 618 191" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M516 441 C560 441 574 191 618 191" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M713 236 L713 274" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M713 364 L713 402" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M808 191 C850 191 868 185 910 185" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M808 319 C850 319 868 307 910 307" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M808 319 C850 319 868 429 910 429" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M808 447 C850 447 868 549 910 549" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="70" y="620" width="1025" height="58" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="92" y="646" class="node-title">关键状态文件</text>
  <text x="220" y="646" class="node-sub">daemon: ~/.claude/daemon/remote-control.json</text>
  <text x="560" y="646" class="node-sub">sessions: ~/.claude/sessions/&lt;pid&gt;.json</text>
  <text x="850" y="646" class="node-sub">logs: ~/.claude/sessions/logs/*.log</text>

  <g transform="translate(50 706)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
    <text x="44" y="12" class="small">启动 / 注册</text>
    <line x1="155" y1="8" x2="189" y2="8" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow-green)"/>
    <text x="199" y="12" class="small">状态更新</text>
    <line x1="310" y1="8" x2="344" y2="8" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arrow-purple)"/>
    <text x="354" y="12" class="small">观测 / 日志</text>
    <line x1="475" y1="8" x2="509" y2="8" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arrow-red)"/>
    <text x="519" y="12" class="small">终止 / 清理</text>
  </g>
</svg>
