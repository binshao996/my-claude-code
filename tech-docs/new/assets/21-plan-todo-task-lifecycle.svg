    <text x="58" y="50" class="small">AppState.todos</text>
    <text x="58" y="68" class="tiny">V2 关闭时启用</text>
  </g>

  <g transform="translate(376,302)">
    <rect width="204" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="16" y="20" width="30" height="30" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <path d="M24 35h14M31 28v14" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    <text x="58" y="28" class="label">TaskCreate / Update</text>
    <text x="58" y="50" class="small">pending / in_progress / completed</text>
    <text x="58" y="68" class="tiny">V2 默认交互会话启用</text>
  </g>

  <g transform="translate(676,286)">
    <rect width="206" height="114" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="18" y="22" width="32" height="32" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <path d="M26 32h16M26 41h12" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round"/>
