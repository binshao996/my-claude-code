    <text x="58" y="52" class="small">全完成后</text>
    <text x="58" y="70" class="tiny">verification nudge</text>
  </g>

  <path d="M1064 196v88" stroke="#16a34a" stroke-width="1.7" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1064 384v38c0 27-27 48-60 48H890" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrow-red)"/>
  <path d="M1012 196c-70 66-154 92-240 108" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1012 196c-252 22-508 46-730 110" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M580 343h96" stroke="#16a34a" stroke-width="1.7" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M882 343h84" stroke="#dc2626" stroke-width="1.7" fill="none" marker-end="url(#arrow-red)"/>

  <g transform="translate(104,512)">
