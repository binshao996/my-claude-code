    <path d="M22 33l5 5 10-13" stroke="#9333ea" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="25" class="label">ExitPlanMode</text>
    <text x="55" y="46" class="small">审批后恢复原权限</text>
  </g>

  <g transform="translate(1012,132)">
