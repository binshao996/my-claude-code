    <text x="64" y="50" class="small">并发写入和 ID 不复用</text>
  </g>

  <g transform="translate(664,512)">
    <rect width="194" height="72" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="18" y="20" width="32" height="32" rx="6" fill="#faf5ff" stroke="#ddd6fe"/>
    <path d="M25 38c6-10 12-10 18 0M25 45c6-6 12-6 18 0" stroke="#9333ea" stroke-width="1.6" fill="none" stroke-linecap="round"/>
