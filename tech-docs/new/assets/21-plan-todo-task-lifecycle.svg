    <path d="M24 36h24M40 28l10 8-10 8" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="23" y="25" class="label">执行回路</text>
    <text x="22" y="47" class="small">coding loop</text>
  </g>

  <path d="M236 164H304" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M480 164H548" stroke="#2563eb" stroke-width="1.7" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M724 164H792" stroke="#9333ea" stroke-width="1.7" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M968 164h44" stroke="#16a34a" stroke-width="1.7" fill="none" marker-end="url(#arrow-green)"/>

  <g transform="translate(92,302)">
    <rect width="190" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="16" y="20" width="30" height="30" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
    <path d="M23 28h16M23 36h16M23 44h10" stroke="#ea580c" stroke-width="1.5" stroke-linecap="round"/>
