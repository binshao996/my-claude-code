    <text x="62" y="52" class="small">owner / blocks / blockedBy</text>
    <text x="62" y="72" class="small">metadata / activeForm</text>
    <text x="62" y="92" class="tiny">Claim 前校验阻塞和忙碌状态</text>
  </g>

  <g transform="translate(966,302)">
    <rect width="126" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="18" y="22" width="28" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <path d="M32 28v12M32 46h.1" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
