<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 20px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .lane { font-size: 13px; font-weight: 600; fill: #374151; }
    .label { font-size: 14px; font-weight: 600; fill: #111827; }
    .small { font-size: 12px; fill: #6b7280; }
    .tiny { font-size: 11px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="42" class="title">Plan Mode / Todo / Task V2 生命周期</text>
  <text x="40" y="64" class="subtitle">从需求澄清、计划审批，到任务拆解、依赖阻塞、UI 观察和完成校验</text>

  <rect x="30" y="92" width="1120" height="124" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="30" y="242" width="1120" height="188" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="30" y="456" width="1120" height="158" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="48" y="118" class="lane">计划与权限层</text>
  <text x="48" y="268" class="lane">任务表达层</text>
  <text x="48" y="482" class="lane">存储、观察与反馈层</text>

  <g transform="translate(76,132)">
    <rect width="160" height="64" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="28" cy="32" r="14" fill="#2563eb" opacity="0.15"/>
    <path d="M24 31h8M28 27v8" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
    <text x="52" y="25" class="label">用户需求</text>
    <text x="52" y="46" class="small">非平凡实现 / 多路径</text>
  </g>

  <g transform="translate(304,132)">
    <rect width="176" height="64" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="16" y="18" width="25" height="28" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
    <path d="M21 25h15M21 32h12M21 39h9" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round"/>
    <text x="55" y="25" class="label">EnterPlanMode</text>
    <text x="55" y="46" class="small">进入 plan 权限模式</text>
  </g>

  <g transform="translate(548,132)">
    <rect width="176" height="64" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="16" y="17" width="26" height="30" rx="4" fill="#faf5ff" stroke="#d8b4fe"/>
    <path d="M24 25h10M24 32h10M24 39h6" stroke="#9333ea" stroke-width="1.5" stroke-linecap="round"/>
    <text x="55" y="25" class="label">Plan Markdown</text>
    <text x="55" y="46" class="small">plansDirectory / ~/.claude</text>
  </g>

  <g transform="translate(792,132)">
    <rect width="176" height="64" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
