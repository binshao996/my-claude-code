    <path d="M34 22c16 0 28 6 28 14s-12 14-28 14S6 44 6 36s12-14 28-14z" transform="translate(12,4)" fill="#eff6ff" stroke="#bfdbfe"/>
    <path d="M18 40c0 8 12 14 28 14s28-6 28-14" fill="none" stroke="#93c5fd"/>
    <text x="76" y="28" class="label">tasks JSON store</text>
    <text x="76" y="50" class="small">~/.claude/tasks/&lt;listId&gt;</text>
  </g>

  <g transform="translate(390,512)">
    <rect width="198" height="72" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="18" y="20" width="32" height="32" rx="6" fill="#f0fdfa" stroke="#99f6e4"/>
    <path d="M25 36h18M34 27v18" stroke="#0f766e" stroke-width="1.7" stroke-linecap="round"/>
