    <text x="64" y="50" class="small">fs.watch + fallback poll</text>
  </g>

  <g transform="translate(920,512)">
    <rect width="180" height="72" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="18" y="20" width="32" height="32" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
    <path d="M26 29h16M26 37h16M26 45h9" stroke="#ea580c" stroke-width="1.6" stroke-linecap="round"/>
    <text x="64" y="28" class="label">TaskList / TaskGet</text>
    <text x="64" y="50" class="small">下一轮模型可见状态</text>
  </g>

  <path d="M478 384v104c0 13-10 24-24 24H314" stroke="#16a34a" stroke-width="1.7" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M314 548h76" stroke="#16a34a" stroke-width="1.7" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M588 548h76" stroke="#9333ea" stroke-width="1.7" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M858 548h62" stroke="#9333ea" stroke-width="1.7" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M190 384v88c0 22 18 40 40 40h22" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <g transform="translate(44,662)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="38" y="12" class="small">计划模式流转</text>
    <line x1="160" y1="8" x2="190" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="198" y="12" class="small">任务状态和执行推进</text>
    <line x1="370" y1="8" x2="400" y2="8" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="408" y="12" class="small">审批、观察和反馈</text>
    <line x1="582" y1="8" x2="612" y2="8" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
