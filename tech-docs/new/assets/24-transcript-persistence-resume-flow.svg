    <text x="654" y="354" class="node-title">subagent sidechain</text>
    <text x="654" y="376" class="node-sub">agent-&lt;agentId&gt;.jsonl</text>
    <text x="654" y="394" class="node-sub">.meta.json 保存 agentType</text>

    <rect x="630" y="456" width="190" height="82" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="654" y="482" class="node-title">metadata entries</text>
    <text x="654" y="504" class="node-sub">title / tag / mode / worktree</text>
    <text x="654" y="522" class="node-sub">file history / attribution</text>

    <rect x="630" y="574" width="190" height="62" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
    <text x="654" y="600" class="node-title">remote ingress / CCR</text>
    <text x="654" y="622" class="node-sub">internal event writer / reader</text>

    <rect x="910" y="146" width="190" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="172" class="node-title">/resume picker</text>
    <text x="932" y="194" class="node-sub">lite head/tail metadata</text>
    <text x="932" y="212" class="node-sub">同项目优先</text>

    <rect x="910" y="270" width="190" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="296" class="node-title">loadTranscriptFile</text>
    <text x="932" y="318" class="node-sub">compact-aware parse</text>
    <text x="932" y="336" class="node-sub">leafUuid 选择链尾</text>

    <rect x="910" y="394" width="190" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="420" class="node-title">conversationRecovery</text>
    <text x="932" y="442" class="node-sub">迁移 / 过滤 / 中断修复</text>
    <text x="932" y="460" class="node-sub">API-valid messages</text>

    <rect x="910" y="518" width="190" height="82" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="932" y="544" class="node-title">sessionRestore</text>
    <text x="932" y="566" class="node-sub">AppState / worktree / agent</text>
    <text x="932" y="584" class="node-sub">adoptResumedSessionFile</text>
  </g>

