<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" width="1180" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Transcript Persistence and Resume Flow</title>
  <desc id="desc">Claude Code transcript persistence and resume recovery architecture.</desc>
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif;
    }
    .title { font-size: 22px; font-weight: 600; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .lane { font-size: 13px; font-weight: 600; fill: #374151; }
    .node-title { font-size: 14px; font-weight: 600; fill: #111827; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .small { font-size: 11px; fill: #6b7280; }
    .code { font-size: 11px; fill: #374151; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Transcript 持久化与 Resume 恢复链路</text>
  <text x="40" y="67" class="subtitle">runtime message stream -&gt; append-only JSONL -&gt; compact-aware chain load -&gt; AppState 恢复</text>

  <rect x="40" y="96" width="250" height="560" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="320" y="96" width="250" height="560" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="600" y="96" width="250" height="560" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <rect x="880" y="96" width="250" height="560" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="62" y="124" class="lane">1. Runtime 事件来源</text>
  <text x="342" y="124" class="lane">2. 清洗、去重与链写入</text>
  <text x="622" y="124" class="lane">3. Session Storage</text>
  <text x="902" y="124" class="lane">4. Resume 恢复入口</text>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="156" width="190" height="86" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
    <circle cx="94" cy="184" r="12" fill="#2563eb"/>
    <path d="M89 184h10M94 179v10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <text x="116" y="181" class="node-title">Interactive REPL</text>
    <text x="116" y="203" class="node-sub">useLogMessages 监听</text>
    <text x="116" y="221" class="node-sub">增量 slice 写入</text>

    <rect x="70" y="285" width="190" height="86" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="82" y="309" width="24" height="18" rx="3" fill="#16a34a"/>
