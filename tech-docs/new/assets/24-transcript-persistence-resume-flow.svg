    <rect x="350" y="156" width="190" height="86" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="372" y="181" class="node-title">cleanMessagesForLogging</text>
    <text x="372" y="203" class="node-sub">过滤 progress / 附件</text>
    <text x="372" y="221" class="node-sub">外部用户隐藏 REPL 包装</text>

    <rect x="350" y="285" width="190" height="86" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="372" y="310" class="node-title">recordTranscript</text>
    <text x="372" y="332" class="node-sub">dedupe + parent hint</text>
    <text x="372" y="350" class="node-sub">compact 后维护链头</text>

    <rect x="350" y="414" width="190" height="86" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="372" y="439" class="node-title">Project.writeQueue</text>
    <text x="372" y="461" class="node-sub">延迟 materialize file</text>
    <text x="372" y="479" class="node-sub">append-only JSONL</text>

    <rect x="630" y="146" width="190" height="96" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
