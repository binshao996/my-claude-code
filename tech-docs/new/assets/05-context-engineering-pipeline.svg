  <rect width="1440" height="900" fill="#ffffff"/>

  <text class="title" x="44" y="54">Claude Code Context Engineering 管线</text>
  <text class="subtitle" x="44" y="84">从静态规则、会话消息、工具结果、记忆召回到 API 请求前的上下文装配</text>

  <rect x="36" y="122" width="305" height="646" rx="8" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 7"/>
