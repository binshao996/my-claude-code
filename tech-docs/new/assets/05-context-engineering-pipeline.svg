  <text class="lane-sub" x="64" y="183">context.ts / claudemd.ts</text>

  <rect x="386" y="122" width="305" height="646" rx="8" fill="#f9fafb" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 7"/>
