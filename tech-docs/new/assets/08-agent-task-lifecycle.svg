<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Agent Task Lifecycle</title>
  <desc id="desc">Lifecycle of local agent tasks from pending and running through backgrounding, completion, notification, retention, and eviction.</desc>
  <defs>
    <filter id="fx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#111827" flood-opacity="0.13"/>
    </filter>
    <marker id="arr-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr-grn" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-rose" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#dc2626"/>
    </marker>
    <marker id="arr-vlt" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#f8fafc"/>
  <rect x="70" y="54" width="1780" height="972" rx="28" fill="#ffffff" filter="url(#fx)"/>
  <rect x="70" y="54" width="1780" height="112" rx="28" fill="#1f2937"/>
  <text x="118" y="122" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">第 8 章图 2：LocalAgentTask 生命周期与信息回流</text>
  <text x="118" y="154" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="19">重点不是状态名，而是每次状态迁移都会同步影响 UI、SDK、transcript、permission、cleanup 与主 Agent 可见的通知。</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="144" y="250" width="230" height="104" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="194" y="294" fill="#1e3a8a" font-size="30" font-weight="800">pending</text>
    <text x="177" y="328" fill="#1d4ed8" font-size="18">task 已创建，等待执行</text>

    <rect x="514" y="206" width="300" height="136" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="560" y="255" fill="#14532d" font-size="30" font-weight="800">running foreground</text>
    <text x="546" y="292" fill="#166534" font-size="18">同步 Agent 正在占用当前 turn</text>
    <text x="546" y="321" fill="#166534" font-size="18">可出现 BackgroundHint</text>

    <rect x="514" y="444" width="300" height="136" rx="18" fill="#f3e8ff" stroke="#7c3aed" stroke-width="3"/>
    <text x="565" y="493" fill="#4c1d95" font-size="30" font-weight="800">running background</text>
    <text x="546" y="530" fill="#5b21b6" font-size="18">异步 Agent 或已后台化</text>
    <text x="546" y="559" fill="#5b21b6" font-size="18">AppState.tasks 可见</text>

    <rect x="954" y="250" width="248" height="112" rx="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
    <text x="1005" y="296" fill="#713f12" font-size="30" font-weight="800">completed</text>
    <text x="990" y="330" fill="#854d0e" font-size="18">finalizeAgentTool 成功</text>

    <rect x="954" y="444" width="248" height="112" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="1030" y="490" fill="#7f1d1d" font-size="30" font-weight="800">failed</text>
    <text x="988" y="524" fill="#991b1b" font-size="18">错误写入 task.error</text>

    <rect x="954" y="638" width="248" height="112" rx="18" fill="#e5e7eb" stroke="#4b5563" stroke-width="3"/>
    <text x="1032" y="684" fill="#1f2937" font-size="30" font-weight="800">killed</text>
    <text x="986" y="718" fill="#374151" font-size="18">abortController.abort()</text>

    <rect x="1370" y="342" width="314" height="188" rx="20" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="1410" y="392" fill="#164e63" font-size="30" font-weight="800">notification</text>
    <text x="1404" y="432" fill="#155e75" font-size="18">enqueueAgentNotification</text>
    <text x="1404" y="463" fill="#155e75" font-size="18">&lt;task-notification&gt;</text>
    <text x="1404" y="494" fill="#155e75" font-size="18">result / usage / output_file</text>

    <rect x="1370" y="650" width="314" height="126" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="3"/>
    <text x="1414" y="699" fill="#1e293b" font-size="30" font-weight="800">evict or retain</text>
    <text x="1404" y="738" fill="#475569" font-size="18">notified 为 true 后可回收</text>
    <text x="1404" y="765" fill="#475569" font-size="18">retain 为 true 时阻止回收</text>

    <rect x="140" y="700" width="320" height="146" rx="20" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
    <text x="177" y="748" fill="#7c2d12" font-size="28" font-weight="800">sidechain transcript</text>
    <text x="174" y="786" fill="#9a3412" font-size="18">recordSidechainTranscript</text>
    <text x="174" y="815" fill="#9a3412" font-size="18">TaskOutput 通过输出文件读取</text>

    <rect x="140" y="878" width="320" height="84" rx="20" fill="#f0fdf4" stroke="#22c55e" stroke-width="3"/>
    <text x="174" y="927" fill="#14532d" font-size="25" font-weight="800">periodic summary</text>
    <text x="174" y="952" fill="#166534" font-size="17">每轮摘要只写 progress.summary</text>

    <path d="M374 302 C420 296 464 286 514 276" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arr-blue)"/>
    <path d="M664 342 C664 380 664 410 664 444" fill="none" stroke="#7c3aed" stroke-width="5" marker-end="url(#arr-vlt)"/>
    <path d="M814 276 C870 280 910 292 954 306" fill="none" stroke="#16a34a" stroke-width="5" marker-end="url(#arr-grn)"/>
    <path d="M814 514 C872 512 912 504 954 500" fill="none" stroke="#7c3aed" stroke-width="5" marker-end="url(#arr-vlt)"/>
    <path d="M814 548 C870 596 904 654 954 694" fill="none" stroke="#dc2626" stroke-width="5" marker-end="url(#arr-rose)"/>
    <path d="M1202 306 C1260 324 1310 362 1370 406" fill="none" stroke="#ca8a04" stroke-width="5" marker-end="url(#arr-grn)"/>
    <path d="M1202 500 C1266 488 1316 468 1370 448" fill="none" stroke="#dc2626" stroke-width="5" marker-end="url(#arr-rose)"/>
    <path d="M1202 694 C1270 650 1320 574 1370 502" fill="none" stroke="#4b5563" stroke-width="5" marker-end="url(#arr-blue)"/>
    <path d="M1527 530 C1527 570 1527 610 1527 650" fill="none" stroke="#0891b2" stroke-width="5" marker-end="url(#arr-blue)"/>
    <path d="M514 512 C432 564 374 636 300 700" fill="none" stroke="#f97316" stroke-width="4" marker-end="url(#arr-rose)"/>
    <path d="M514 512 C430 620 376 786 300 878" fill="none" stroke="#22c55e" stroke-width="4" marker-end="url(#arr-grn)"/>

    <rect x="144" y="420" width="230" height="98" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="176" y="459" fill="#334155" font-size="24" font-weight="800">task_started</text>
    <text x="172" y="490" fill="#475569" font-size="18">registerTask 发 SDK 事件</text>
    <path d="M259 354 C259 378 259 398 259 420" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arr-blue)"/>

    <rect x="954" y="828" width="730" height="106" rx="22" fill="#f8fafc" stroke="#64748b" stroke-width="3"/>
    <text x="998" y="872" fill="#1e293b" font-size="27" font-weight="800">生命周期防线</text>
    <text x="998" y="908" fill="#475569" font-size="20">状态迁移先写 TaskState，再做分类器、worktree cleanup、通知补充，避免外部 I/O 阻塞任务终态。</text>
  </g>
</svg>
