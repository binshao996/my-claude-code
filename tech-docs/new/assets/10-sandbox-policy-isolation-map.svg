<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="ttl desc">
  <title id="ttl">第 10 章图 2：Sandbox 策略与隔离面</title>
  <desc id="desc">SandboxManager 如何把 settings、权限规则、网络域名、文件系统规则、平台能力和运行时回调转换成沙箱运行时配置。</desc>
  <defs>
    <marker id="arr-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arr-grn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#059669"/>
    </marker>
    <marker id="arr-rose" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#e11d48"/>
    </marker>
    <marker id="arr-vlt" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .hub { fill: #111827; stroke: #111827; stroke-width: 3; }
      .hub-title { font: 700 26px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .hub-txt { font: 400 17px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #d1d5db; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .green { fill: #ecfdf5; stroke: #34d399; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .rose { fill: #fff1f2; stroke: #fb7185; }
      .violet { fill: #f5f3ff; stroke: #a78bfa; }
      .slate { fill: #f1f5f9; stroke: #64748b; }
      .card-title { font: 700 20px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .txt { font: 400 16px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .mono { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #1e293b; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arr-blue); }
      .arrow-g { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arr-grn); }
      .arrow-r { fill: none; stroke: #e11d48; stroke-width: 3; marker-end: url(#arr-rose); }
      .arrow-v { fill: none; stroke: #7c3aed; stroke-width: 3; marker-end: url(#arr-vlt); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1040"/>
  <text class="title" x="64" y="64">Sandbox 策略与隔离面</text>
  <text class="sub" x="64" y="96">沙箱不是单一开关，而是 settings、权限规则、运行时平台和网络请求审批共同合成的运行时配置。</text>

  <rect class="hub" x="570" y="398" width="460" height="202" rx="18"/>
  <text class="hub-title" x="620" y="462">SandboxManager</text>
  <text class="hub-txt" x="620" y="498">convertToSandboxRuntimeConfig</text>
  <text class="hub-txt" x="620" y="530">wrapWithSandbox / cleanup</text>
  <text class="hub-txt" x="620" y="562">violation annotation / proxy state</text>

  <rect class="card blue" x="78" y="156" width="338" height="130" rx="12"/>
  <text class="card-title" x="104" y="194">settings.sandbox</text>
  <text class="txt" x="104" y="226">enabled、failIfUnavailable</text>
  <text class="txt" x="104" y="252">autoAllowBashIfSandboxed</text>
  <text class="small" x="104" y="274">network / filesystem / passthrough</text>

  <rect class="card amber" x="78" y="356" width="338" height="148" rx="12"/>
  <text class="card-title" x="104" y="394">权限规则输入</text>
  <text class="txt" x="104" y="426">Bash / Read / Edit / WebFetch</text>
  <text class="txt" x="104" y="452">allow、deny、ask 与 source</text>
  <text class="small" x="104" y="476">路径规则要按来源解析</text>

  <rect class="card green" x="78" y="574" width="338" height="148" rx="12"/>
  <text class="card-title" x="104" y="612">文件系统隔离</text>
  <text class="txt" x="104" y="644">allowWrite、denyWrite</text>
  <text class="txt" x="104" y="670">denyRead、allowRead</text>
  <text class="small" x="104" y="694">settings、skills、裸仓库重点保护</text>

  <rect class="card violet" x="78" y="792" width="338" height="130" rx="12"/>
  <text class="card-title" x="104" y="830">命令级开关</text>
  <text class="txt" x="104" y="862">excludedCommands</text>
  <text class="txt" x="104" y="888">dangerouslyDisableSandbox</text>
  <text class="small" x="104" y="910">只影响是否包装，不替代权限</text>

  <rect class="card rose" x="1184" y="156" width="338" height="148" rx="12"/>
  <text class="card-title" x="1210" y="194">平台与依赖</text>
  <text class="txt" x="1210" y="226">supported platform</text>
  <text class="txt" x="1210" y="252">runtime deps</text>
  <text class="small" x="1210" y="278">不可用时 warn 或 fail</text>

  <rect class="card blue" x="1184" y="374" width="338" height="160" rx="12"/>
  <text class="card-title" x="1210" y="412">网络隔离</text>
  <text class="txt" x="1210" y="444">allowedDomains / deniedDomains</text>
  <text class="txt" x="1210" y="470">HTTP / SOCKS proxy</text>
  <text class="txt" x="1210" y="496">Unix socket / local binding</text>
  <text class="small" x="1210" y="518">越界请求进入 ask callback</text>

  <rect class="card amber" x="1184" y="604" width="338" height="148" rx="12"/>
  <text class="card-title" x="1210" y="642">运行时审批</text>
  <text class="txt" x="1210" y="674">SandboxPermissionRequest</text>
  <text class="txt" x="1210" y="700">structured IO / REPL / swarm</text>
  <text class="small" x="1210" y="724">managed-only 会收窄用户选择</text>

  <rect class="card slate" x="1184" y="822" width="338" height="130" rx="12"/>
  <text class="card-title" x="1210" y="860">命令执行输出</text>
  <text class="txt" x="1210" y="892">wrapWithSandbox 后 spawn</text>
  <text class="txt" x="1210" y="918">cleanup 后注释 violation</text>
  <text class="small" x="1210" y="940">stderr 给模型可读解释</text>

  <path class="arrow" d="M416 221 C500 250 520 390 570 440"/>
  <path class="arrow" d="M416 430 H570"/>
  <path class="arrow-g" d="M416 648 C520 640 520 560 570 540"/>
  <path class="arrow-v" d="M416 856 C510 820 530 610 570 570"/>

  <path class="arrow-r" d="M1184 230 C1080 250 1060 390 1030 438"/>
  <path class="arrow" d="M1184 454 H1030"/>
  <path class="arrow" d="M1184 678 C1090 660 1060 580 1030 552"/>
  <path class="arrow-g" d="M1030 500 C1110 540 1120 838 1184 884"/>

  <rect class="card green" x="570" y="680" width="460" height="122" rx="12"/>
  <text class="card-title" x="600" y="718">RuntimeConfig 输出</text>
  <text class="txt" x="600" y="750">filesystem + network + proxy + policy flags</text>
  <text class="txt" x="600" y="776">供 sandbox-runtime 包装真实命令</text>

  <path class="arrow-g" d="M800 600 V680"/>

  <rect class="card rose" x="570" y="852" width="460" height="86" rx="12"/>
  <text class="card-title" x="600" y="888">安全兜底</text>
  <text class="txt" x="600" y="916">沙箱增强权限体验，但显式 deny 与 ask 仍优先生效</text>

  <path class="arrow-r dash" d="M800 802 V852"/>
</svg>
