<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Hooks Runtime Pipeline</title>
  <desc id="desc">Claude Code hook events are normalized into hook inputs, matched against hook sources, executed through several hook runners, parsed into structured results, and applied back to the runtime.</desc>
  <defs>
    <filter id="fx" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#14213d" flood-opacity="0.13"/>
    </filter>
    <marker id="arr-blue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2b6cb0"/>
    </marker>
    <marker id="arr-grn" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2f855a"/>
    </marker>
    <marker id="arr-rose" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#c05621"/>
    </marker>
    <marker id="arr-vlt" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#6b46c1"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#f6f8fb"/>
  <rect x="64" y="54" width="1792" height="972" rx="28" fill="#ffffff" filter="url(#fx)"/>
  <rect x="64" y="54" width="1792" height="118" rx="28" fill="#102a43"/>
  <text x="112" y="126" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">第 9 章图 1：Hooks 运行时管线</text>
  <text x="112" y="158" fill="#bcccdc" font-family="Inter, Arial, sans-serif" font-size="19">核心思想：Hook 不是散落在各处的回调，而是一条从事件输入、配置汇聚、匹配过滤、隔离执行到结果治理的事件总线。</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="102" y="226" width="266" height="184" rx="18" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="3"/>
    <circle cx="145" cy="271" r="23" fill="#2b6cb0"/>
    <text x="137" y="279" fill="#ffffff" font-size="24" font-weight="800">1</text>
    <text x="184" y="270" fill="#16324f" font-size="27" font-weight="800">Event Source</text>
    <text x="128" y="313" fill="#274c77" font-size="20">tool / prompt / session</text>
    <text x="128" y="346" fill="#274c77" font-size="20">subagent / task / mcp</text>
    <text x="128" y="379" fill="#274c77" font-size="20">config / file / worktree</text>

    <rect x="462" y="226" width="296" height="184" rx="18" fill="#e6fffa" stroke="#2f855a" stroke-width="3"/>
    <circle cx="506" cy="271" r="23" fill="#2f855a"/>
    <text x="498" y="279" fill="#ffffff" font-size="24" font-weight="800">2</text>
    <text x="544" y="270" fill="#153e3b" font-size="27" font-weight="800">Base Hook Input</text>
    <text x="490" y="313" fill="#22543d" font-size="20">session_id / transcript_path</text>
    <text x="490" y="346" fill="#22543d" font-size="20">cwd / permission_mode</text>
    <text x="490" y="379" fill="#22543d" font-size="20">agent_id / agent_type</text>

    <rect x="862" y="226" width="316" height="184" rx="18" fill="#fff7ed" stroke="#c05621" stroke-width="3"/>
    <circle cx="906" cy="271" r="23" fill="#c05621"/>
    <text x="898" y="279" fill="#ffffff" font-size="24" font-weight="800">3</text>
    <text x="944" y="270" fill="#5f370e" font-size="27" font-weight="800">Hook Sources</text>
    <text x="890" y="313" fill="#7c2d12" font-size="20">settings snapshot / policy</text>
    <text x="890" y="346" fill="#7c2d12" font-size="20">plugin hooks / SDK callback</text>
    <text x="890" y="379" fill="#7c2d12" font-size="20">session / skill / agent hooks</text>

    <rect x="1282" y="226" width="304" height="184" rx="18" fill="#f3e8ff" stroke="#6b46c1" stroke-width="3"/>
    <circle cx="1326" cy="271" r="23" fill="#6b46c1"/>
    <text x="1318" y="279" fill="#ffffff" font-size="24" font-weight="800">4</text>
    <text x="1364" y="270" fill="#44337a" font-size="27" font-weight="800">Match &amp; Policy</text>
    <text x="1310" y="313" fill="#553c9a" font-size="20">matcher by event field</text>
    <text x="1310" y="346" fill="#553c9a" font-size="20">if rule for tool events</text>
    <text x="1310" y="379" fill="#553c9a" font-size="20">trust gate / managed policy</text>

    <rect x="238" y="516" width="310" height="206" rx="18" fill="#eef2ff" stroke="#4c51bf" stroke-width="3"/>
    <text x="264" y="562" fill="#2d3748" font-size="27" font-weight="800">Execute Hook</text>
    <text x="264" y="607" fill="#4a5568" font-size="20">command: shell process</text>
    <text x="264" y="640" fill="#4a5568" font-size="20">http: POST JSON</text>
    <text x="264" y="673" fill="#4a5568" font-size="20">prompt / agent: model verifier</text>
    <text x="264" y="706" fill="#4a5568" font-size="20">callback / function: in memory</text>

    <rect x="662" y="516" width="310" height="206" rx="18" fill="#e9f7ef" stroke="#2f855a" stroke-width="3"/>
    <text x="688" y="562" fill="#1f3d2b" font-size="27" font-weight="800">Parse Output</text>
    <text x="688" y="607" fill="#276749" font-size="20">JSON schema first</text>
    <text x="688" y="640" fill="#276749" font-size="20">plain text fallback for shell</text>
    <text x="688" y="673" fill="#276749" font-size="20">exit code two means block</text>
    <text x="688" y="706" fill="#276749" font-size="20">HTTP body must be JSON</text>

    <rect x="1086" y="516" width="340" height="206" rx="18" fill="#fff1f2" stroke="#be123c" stroke-width="3"/>
    <text x="1112" y="562" fill="#5c1f2e" font-size="27" font-weight="800">Aggregate Result</text>
    <text x="1112" y="607" fill="#9f1239" font-size="20">blockingError / stopReason</text>
    <text x="1112" y="640" fill="#9f1239" font-size="20">context / systemMessage</text>
    <text x="1112" y="673" fill="#9f1239" font-size="20">updatedInput / MCP output</text>
    <text x="1112" y="706" fill="#9f1239" font-size="20">permission / retry / watchPaths</text>

    <rect x="1516" y="516" width="282" height="206" rx="18" fill="#fefce8" stroke="#ca8a04" stroke-width="3"/>
    <text x="1542" y="562" fill="#5f3b00" font-size="27" font-weight="800">Runtime Effect</text>
    <text x="1542" y="607" fill="#854d0e" font-size="20">allow / deny / ask</text>
    <text x="1542" y="640" fill="#854d0e" font-size="20">inject context</text>
    <text x="1542" y="673" fill="#854d0e" font-size="20">mutate input or output</text>
    <text x="1542" y="706" fill="#854d0e" font-size="20">rewake / notify / continue</text>

    <rect x="242" y="828" width="1436" height="102" rx="22" fill="#f8fafc" stroke="#334155" stroke-width="3"/>
    <text x="300" y="873" fill="#1e293b" font-size="28" font-weight="800">核心控制面：executeHooks 进入 REPL 消息流，executeHooksOutsideREPL 处理会话、通知、配置、文件等外部事件</text>
    <text x="300" y="910" fill="#475569" font-size="21">统一输出 AggregatedHookResult，让调用方只关心阻断、注入、修改、权限决策、watchPaths 与异步回流。</text>

    <path d="M368 318 C402 318 428 318 462 318" fill="none" stroke="#2b6cb0" stroke-width="5" marker-end="url(#arr-blue)"/>
    <path d="M758 318 C792 318 828 318 862 318" fill="none" stroke="#2f855a" stroke-width="5" marker-end="url(#arr-grn)"/>
    <path d="M1178 318 C1212 318 1248 318 1282 318" fill="none" stroke="#c05621" stroke-width="5" marker-end="url(#arr-rose)"/>
    <path d="M1434 410 C1320 462 890 462 548 516" fill="none" stroke="#6b46c1" stroke-width="5" marker-end="url(#arr-vlt)"/>
    <path d="M548 619 C588 619 622 619 662 619" fill="none" stroke="#4c51bf" stroke-width="5" marker-end="url(#arr-vlt)"/>
    <path d="M972 619 C1012 619 1046 619 1086 619" fill="none" stroke="#2f855a" stroke-width="5" marker-end="url(#arr-grn)"/>
    <path d="M1426 619 C1456 619 1486 619 1516 619" fill="none" stroke="#be123c" stroke-width="5" marker-end="url(#arr-rose)"/>
    <path d="M1657 722 C1570 780 1430 812 1320 828" fill="none" stroke="#ca8a04" stroke-width="5" marker-end="url(#arr-rose)"/>
    <path d="M393 722 C480 790 615 816 720 828" fill="none" stroke="#4c51bf" stroke-width="5" marker-end="url(#arr-vlt)"/>

    <rect x="116" y="950" width="1688" height="44" rx="22" fill="#e2e8f0"/>
    <text x="146" y="979" fill="#334155" font-size="19">源码主线：coreSchemas.ts → hooksConfigSnapshot.ts → hooks.ts → execHttpHook.ts / execPromptHook.ts / execAgentHook.ts → PermissionContext.ts</text>
  </g>
</svg>
