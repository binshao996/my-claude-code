<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 26px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .section { font-size: 15px; font-weight: 700; fill: #374151; }
    .node-title { font-size: 14px; font-weight: 700; fill: #111827; }
    .node-text { font-size: 12px; fill: #6b7280; }
    .code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 12px; fill: #374151; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="780" fill="#ffffff"/>
  <text x="36" y="42" class="title">Read Safety &amp; Budget：读取工具的安全与上下文预算控制</text>
  <text x="36" y="66" class="subtitle">Read 不只是 fs.readFile：它同时承担权限、类型分流、文件大小、token 预算、媒体压缩、重复读取去重和后续编辑快照</text>

  <rect x="34" y="96" width="240" height="548" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="58" y="128" class="section">输入与权限</text>
  <rect x="64" y="158" width="180" height="88" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="86" y="186" class="node-title">Read Input</text>
  <text x="86" y="210" class="node-text">absolute file_path</text>
  <text x="86" y="232" class="code">offset / limit / pages</text>

  <rect x="64" y="296" width="180" height="128" rx="8" fill="#fee2e2" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="86" y="324" class="node-title">Validate</text>
  <text x="86" y="348" class="node-text">deny rule</text>
  <text x="86" y="370" class="node-text">UNC 防 NTLM</text>
  <text x="86" y="392" class="node-text">binary / device</text>
  <text x="86" y="414" class="node-text">PDF pages range</text>

  <rect x="322" y="96" width="268" height="548" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="346" y="128" class="section">类型分流</text>
  <rect x="352" y="158" width="94" height="80" rx="8" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="377" y="186" class="node-title">Text</text>
  <text x="371" y="210" class="node-text">line range</text>
  <rect x="470" y="158" width="94" height="80" rx="8" fill="#ede9fe" stroke="#ddd6fe" filter="url(#shadow)"/>
  <text x="493" y="186" class="node-title">Image</text>
  <text x="488" y="210" class="node-text">resize</text>

  <rect x="352" y="288" width="94" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
  <text x="380" y="316" class="node-title">PDF</text>
  <text x="370" y="340" class="node-text">document</text>
  <rect x="470" y="288" width="94" height="80" rx="8" fill="#f0fdfa" stroke="#ccfbf1" filter="url(#shadow)"/>
  <text x="486" y="316" class="node-title">Notebook</text>
  <text x="488" y="340" class="node-text">cells</text>

  <rect x="370" y="438" width="176" height="104" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="392" y="466" class="node-title">FileReadTool.call</text>
  <text x="392" y="490" class="node-text">统一输出 schema</text>
  <text x="392" y="512" class="node-text">日志与 listener</text>

  <rect x="638" y="96" width="268" height="548" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="662" y="128" class="section">预算控制</text>
  <rect x="668" y="158" width="208" height="104" rx="8" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="690" y="186" class="node-title">readFileInRange</text>
  <text x="690" y="210" class="node-text">10MB 以下 fast path</text>
  <text x="690" y="232" class="node-text">大文件 streaming path</text>

  <rect x="668" y="318" width="208" height="104" rx="8" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
  <text x="690" y="346" class="node-title">Limits</text>
  <text x="690" y="370" class="node-text">maxSizeBytes 默认 256KB</text>
  <text x="690" y="392" class="node-text">maxTokens 默认 25000</text>

  <rect x="668" y="482" width="208" height="104" rx="8" fill="#ede9fe" stroke="#ddd6fe" filter="url(#shadow)"/>
  <text x="690" y="510" class="node-title">Media Budget</text>
  <text x="690" y="534" class="node-text">image token compression</text>
  <text x="690" y="556" class="node-text">large PDF page reference</text>

  <rect x="954" y="96" width="292" height="548" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="978" y="128" class="section">上下文副作用</text>
  <rect x="988" y="158" width="222" height="104" rx="8" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1010" y="186" class="node-title">Read Dedup</text>
  <text x="1010" y="210" class="node-text">同范围且 mtime 未变</text>
  <text x="1010" y="232" class="code">FILE_UNCHANGED_STUB</text>

  <rect x="988" y="318" width="222" height="104" rx="8" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="1010" y="346" class="node-title">FileStateCache</text>
  <text x="1010" y="370" class="node-text">content / timestamp</text>
  <text x="1010" y="392" class="node-text">offset / limit</text>

  <rect x="988" y="482" width="222" height="104" rx="8" fill="#faf5ff" stroke="#e9d5ff" filter="url(#shadow)"/>
  <text x="1010" y="510" class="node-title">Attachments</text>
  <text x="1010" y="534" class="node-text">@ mention / compact restore</text>
  <text x="1010" y="556" class="node-text">nested memory / skill trigger</text>

  <path d="M154 246 L154 296" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M244 360 C286 360, 302 198, 352 198" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M244 360 C292 360, 310 328, 352 328" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M564 198 C604 198, 620 210, 668 210" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M564 328 C608 328, 620 370, 668 370" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M546 490 C598 490, 618 534, 668 534" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M876 210 C920 210, 940 210, 988 210" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M876 370 C920 370, 940 370, 988 370" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M876 534 C920 534, 940 534, 988 534" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M1098 318 C1098 296, 1098 286, 1098 262" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>

  <rect x="328" y="672" width="626" height="54" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="356" y="696" class="node-title">核心不变量</text>
  <text x="470" y="696" class="node-text">读取结果进入上下文前必须经过权限、体积、token 和类型控制；进入上下文后必须留下可供编辑 stale check 使用的快照。</text>

  <g transform="translate(38, 722)">
    <line x1="0" y1="8" x2="32" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="40" y="12" class="node-text">校验与分流</text>
    <line x1="180" y1="8" x2="212" y2="8" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="220" y="12" class="node-text">读取与预算</text>
    <line x1="360" y1="8" x2="392" y2="8" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="400" y="12" class="node-text">附件与上下文</text>
    <line x1="560" y1="8" x2="592" y2="8" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="600" y="12" class="node-text">重复读取降噪</text>
  </g>
</svg>
