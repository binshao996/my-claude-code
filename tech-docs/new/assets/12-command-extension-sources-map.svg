<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" width="1280" height="860">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'Microsoft JhengHei', 'SimHei', sans-serif; }
    .title { font-size: 24px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .label { font-size: 15px; font-weight: 600; fill: #111827; }
    .small { font-size: 12px; fill: #4b5563; }
    .tiny { font-size: 11px; fill: #6b7280; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .blue { fill: #eff6ff; stroke: #bfdbfe; }
    .green { fill: #f0fdf4; stroke: #bbf7d0; }
    .purple { fill: #faf5ff; stroke: #e9d5ff; }
    .red { fill: #fef2f2; stroke: #fecaca; }
    .orange { fill: #fff7ed; stroke: #fed7aa; }
    .teal { fill: #f0fdfa; stroke: #99f6e4; }
    .gray { fill: #f9fafb; stroke: #d1d5db; }
    .rail { fill: none; stroke: #e5e7eb; stroke-width: 1.2; stroke-dasharray: 6 5; rx: 14; ry: 14; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-grn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-vlt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arr-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arr-org" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1280" height="860" fill="#ffffff"/>
  <text x="44" y="48" class="title">Command Extension Sources Map</text>
  <text x="44" y="72" class="subtitle">命令面由硬编码内置命令、磁盘 Skill、插件、内置插件、MCP 与运行时发现共同组成，最终供 UI、模型与远端客户端消费。</text>

  <rect x="42" y="106" width="360" height="600" class="rail"/>
  <text x="62" y="132" class="small">命令来源</text>

  <rect x="74" y="158" width="280" height="76" class="box blue"/>
  <text x="98" y="188" class="label">COMMANDS()</text>
  <text x="98" y="210" class="small">硬编码 built-in command</text>
  <text x="98" y="228" class="small">feature flag 条件加载</text>

  <rect x="74" y="262" width="280" height="76" class="box green"/>
  <text x="98" y="292" class="label">Bundled Skills</text>
  <text x="98" y="314" class="small">initBundledSkills 注册</text>
  <text x="98" y="332" class="small">source bundled</text>

  <rect x="74" y="366" width="280" height="76" class="box green"/>
  <text x="98" y="396" class="label">Built-in Plugins</text>
  <text x="98" y="418" class="small">用户可启停</text>
  <text x="98" y="436" class="small">技能转 Command</text>

  <rect x="74" y="470" width="280" height="94" class="box orange"/>
  <text x="98" y="500" class="label">Skill Directories</text>
  <text x="98" y="522" class="small">managed / user / project</text>
  <text x="98" y="540" class="small">additional dirs</text>
  <text x="98" y="558" class="small">legacy commands</text>

  <rect x="74" y="592" width="280" height="76" class="box purple"/>
  <text x="98" y="622" class="label">Marketplace Plugins</text>
  <text x="98" y="644" class="small">commandsPath / skillsPath</text>
  <text x="98" y="662" class="small">inline content / metadata</text>

  <rect x="460" y="122" width="328" height="584" class="rail"/>
  <text x="480" y="148" class="small">加载与过滤</text>

  <rect x="500" y="182" width="248" height="86" class="box teal"/>
  <text x="528" y="214" class="label">loadAllCommands(cwd)</text>
  <text x="528" y="236" class="small">Promise.all 并行加载</text>
  <text x="528" y="254" class="small">按来源拼接数组</text>

  <rect x="500" y="304" width="248" height="86" class="box teal"/>
  <text x="528" y="336" class="label">getCommands(cwd)</text>
  <text x="528" y="358" class="small">availability 过滤</text>
  <text x="528" y="376" class="small">isEnabled 动态判定</text>

  <rect x="500" y="426" width="248" height="86" class="box teal"/>
  <text x="528" y="458" class="label">Dynamic Skills</text>
  <text x="528" y="480" class="small">文件操作触发发现</text>
  <text x="528" y="498" class="small">paths 条件激活</text>

  <rect x="500" y="548" width="248" height="86" class="box teal"/>
  <text x="528" y="580" class="label">Caches and Refresh</text>
  <text x="528" y="602" class="small">skill watcher 清缓存</text>
  <text x="528" y="620" class="small">GrowthBook 重过滤</text>

  <path d="M354 196 C412 196, 430 225, 500 225" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M354 300 C412 300, 430 225, 500 225" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M354 404 C412 404, 430 225, 500 225" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M354 517 C412 517, 430 225, 500 225" stroke="#ea580c" stroke-width="1.8" fill="none" marker-end="url(#arr-org)"/>
  <path d="M354 630 C412 630, 430 225, 500 225" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arr-vlt)"/>
  <path d="M624 268 L624 304" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M624 390 L624 426" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M624 512 L624 548" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>

  <rect x="846" y="106" width="370" height="600" class="rail"/>
  <text x="866" y="132" class="small">消费端与运行时合并</text>

  <rect x="888" y="158" width="280" height="76" class="box gray"/>
  <text x="912" y="188" class="label">REPL localCommands</text>
  <text x="912" y="210" class="small">启动时 initialCommands</text>
  <text x="912" y="228" class="small">文件变化刷新</text>

  <rect x="888" y="262" width="280" height="76" class="box purple"/>
  <text x="912" y="292" class="label">AppState plugins.commands</text>
  <text x="912" y="314" class="small">useManagePlugins 热更新</text>
  <text x="912" y="332" class="small">按 name 去重合并</text>

  <rect x="888" y="366" width="280" height="76" class="box purple"/>
  <text x="912" y="396" class="label">AppState mcp.commands</text>
  <text x="912" y="418" class="small">MCP prompts 转命令</text>
  <text x="912" y="436" class="small">REPL 二次合并</text>

  <rect x="888" y="486" width="280" height="92" class="box blue"/>
  <text x="912" y="518" class="label">UI Consumers</text>
  <text x="912" y="540" class="small">typeahead / help / skills menu</text>
  <text x="912" y="558" class="small">keybinding 与高亮</text>

  <rect x="888" y="612" width="280" height="76" class="box red"/>
  <text x="912" y="642" class="label">Runtime Consumers</text>
  <text x="912" y="664" class="small">processSlashCommand</text>
  <text x="912" y="682" class="small">SkillTool / Remote init</text>

  <path d="M748 347 C820 347, 820 196, 888 196" stroke="#16a34a" stroke-width="1.8" fill="none" marker-end="url(#arr-grn)"/>
  <path d="M748 347 C820 347, 820 300, 888 300" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arr-vlt)"/>
  <path d="M748 347 C820 347, 820 404, 888 404" stroke="#9333ea" stroke-width="1.8" fill="none" marker-end="url(#arr-vlt)"/>
  <path d="M1028 442 L1028 486" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M1028 578 L1028 612" stroke="#dc2626" stroke-width="1.8" fill="none" marker-end="url(#arr-rose)"/>

  <rect x="128" y="748" width="1024" height="58" class="box gray"/>
  <text x="154" y="779" class="label">关键约束</text>
  <text x="260" y="779" class="small">bare 模式限制自动发现；plugin-only 策略限制本地 Skill；非交互模式过滤 local-jsx；Bridge 只暴露安全命令。</text>

  <g transform="translate(58, 828)">
    <line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arr-blue)"/>
    <text x="44" y="12" class="tiny">内置与 UI</text>
    <line x1="128" y1="8" x2="162" y2="8" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arr-grn)"/>
    <text x="172" y="12" class="tiny">Skill 汇聚</text>
    <line x1="286" y1="8" x2="320" y2="8" stroke="#9333ea" stroke-width="1.8" marker-end="url(#arr-vlt)"/>
    <text x="330" y="12" class="tiny">插件与 MCP</text>
    <line x1="452" y1="8" x2="486" y2="8" stroke="#dc2626" stroke-width="1.8" marker-end="url(#arr-rose)"/>
    <text x="496" y="12" class="tiny">运行时消费</text>
  </g>
</svg>
