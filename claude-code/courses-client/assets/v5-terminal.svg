<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 840" width="1160" height="840">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 24px; font-weight: 700; }
    .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .note { font-size: 12px; fill: #cbd5e1; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1160" height="840" fill="url(#bg-grad)"/>
  <text x="48" y="52" class="title">V5 Terminal</text>
  <text x="48" y="78" class="sub">Integrated terminal uses xterm.js plus PTY, while Agent command execution stays behind Runtime run_command, sandbox, and permission checks.</text>

  <rect x="40" y="108" width="1080" height="116" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="132" class="layer">WORKSPACE INPUT</text>
  <rect x="92" y="156" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="122" y="186" class="label">Workspace.rootPath</text>
  <rect x="412" y="156" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="442" y="186" class="label">Shell Profile</text>
  <rect x="732" y="156" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="762" y="186" class="label">Terminal Panel</text>

  <rect x="40" y="274" width="1080" height="152" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="298" class="layer">TERMINAL CORE</text>
  <rect x="84" y="328" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="112" y="352" class="label">TerminalService</text>
  <text x="112" y="372" class="sub">spawn / write / resize</text>
  <rect x="356" y="328" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="384" y="352" class="label">node-pty</text>
  <text x="384" y="372" class="sub">shell process</text>
  <rect x="628" y="328" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="656" y="352" class="label">TerminalStore</text>
  <text x="656" y="372" class="sub">sessions / active / status</text>
  <rect x="900" y="328" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="928" y="352" class="label">Output Buffer</text>
  <text x="928" y="372" class="sub">ring / transcript</text>

  <rect x="40" y="486" width="1080" height="146" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="510" class="layer">PRESENTATION LAYER</text>
  <rect x="84" y="540" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="112" y="564" class="label">TerminalLayout</text>
  <text x="112" y="584" class="sub">panel / tabs</text>
  <rect x="356" y="540" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="384" y="564" class="label">xterm.js</text>
  <text x="384" y="584" class="sub">terminal frontend</text>
  <rect x="628" y="540" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="656" y="564" class="label">TerminalTabs</text>
  <text x="656" y="584" class="sub">active / close / split later</text>
  <rect x="900" y="540" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="928" y="564" class="label">Command Palette</text>
  <text x="928" y="584" class="sub">run test / build</text>

  <rect x="40" y="684" width="1080" height="96" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="708" class="layer">AGENT RUNTIME BRIDGE</text>
  <rect x="84" y="728" width="250" height="42" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="112" y="754" class="label">Runtime run_command</text>
  <rect x="432" y="728" width="250" height="42" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="462" y="754" class="label">Sandbox / Permission</text>
  <rect x="780" y="728" width="250" height="42" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="810" y="754" class="label">Agent observes result</text>

  <path d="M197 208 V328" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M517 208 C517 262,179 274,179 328" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M837 208 C837 262,723 274,723 328" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M274 359 H356" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M546 359 H628" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M818 359 H900" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M723 390 C723 470,451 470,451 540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M179 390 C179 470,179 470,179 540" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M274 569 H356" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M546 569 H628" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M995 598 C995 650,209 676,209 728" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M334 749 H432" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M682 749 H780" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
</svg>
