<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 780" width="1160" height="780">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 24px; font-weight: 700; }
    .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .note { font-size: 12px; fill: #cbd5e1; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1160" height="780" fill="url(#bg-grad)"/>
  <text x="48" y="52" class="title">V2 Workspace</text>
  <text x="48" y="78" class="sub">A project workspace turns cwd into a product object that owns runtime context, recent projects, and project-scoped state.</text>

  <rect x="40" y="108" width="1080" height="122" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="132" class="layer">USER WORKFLOW</text>
  <rect x="86" y="158" width="180" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="116" y="188" class="label">Open Project</text>
  <rect x="332" y="158" width="180" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="362" y="188" class="label">Recent List</text>
  <rect x="578" y="158" width="180" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="608" y="188" class="label">Switch Project</text>
  <rect x="824" y="158" width="180" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="854" y="188" class="label">Start Chat</text>

  <rect x="40" y="282" width="1080" height="150" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="306" class="layer">WORKSPACE CORE</text>
  <rect x="84" y="334" width="200" height="64" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="112" y="360" class="label">Workspace</text>
  <text x="112" y="380" class="sub">id / rootPath / displayName</text>
  <rect x="366" y="334" width="200" height="64" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="394" y="360" class="label">WorkspaceStore</text>
  <text x="394" y="380" class="sub">current / recent / metadata</text>
  <rect x="648" y="334" width="200" height="64" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="676" y="360" class="label">WorkspaceService</text>
  <text x="676" y="380" class="sub">validate / open / persist</text>
  <rect x="930" y="334" width="80" height="64" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="954" y="360" class="label">IPC</text>
  <text x="940" y="380" class="sub">main bridge</text>

  <rect x="40" y="484" width="1080" height="136" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="508" class="layer">RUNTIME BINDING</text>
  <rect x="86" y="536" width="190" height="56" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="116" y="560" class="label">RuntimeFactory</text>
  <text x="116" y="580" class="sub">create by workspace</text>
  <rect x="366" y="536" width="190" height="56" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="396" y="560" class="label">RuntimeClient</text>
  <text x="396" y="580" class="sub">cwd = rootPath</text>
  <rect x="646" y="536" width="190" height="56" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="676" y="560" class="label">SessionStore</text>
  <text x="676" y="580" class="sub">project scoped</text>
  <rect x="926" y="536" width="190" height="56" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="956" y="560" class="label">MemoryStore</text>
  <text x="956" y="580" class="sub">CLAUDE.md / local</text>

  <path d="M266 184 H332" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M512 184 H578" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M758 184 H824" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M176 210 V334" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M422 210 C422 260,466 274,466 334" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M668 210 C668 260,466 274,466 334" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M914 210 C914 260,970 274,970 334" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M284 366 H366" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M566 366 H648" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M848 366 H930" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M466 398 C466 468,181 466,181 536" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M276 564 H366" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M556 564 H646" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M836 564 H926" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M970 398 C970 454,461 476,461 536" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="732" y="466" class="sub">workspace changed</text>

  <rect x="48" y="674" width="628" height="54" rx="6" fill="#111827" stroke="#334155" stroke-width="1"/>
  <line x1="68" y1="692" x2="100" y2="692" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="112" y="696" class="note">user workflow</text>
  <line x1="260" y1="692" x2="292" y2="692" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="304" y="696" class="note">workspace state</text>
  <line x1="68" y1="714" x2="100" y2="714" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="112" y="718" class="note">runtime creation</text>
  <line x1="260" y1="714" x2="292" y2="714" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="304" y="718" class="note">project-scoped runtime data</text>
</svg>
