<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 860" width="1160" height="860">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 24px; font-weight: 700; }
    .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1160" height="860" fill="url(#bg-grad)"/>
  <text x="48" y="52" class="title">V9 Plugin System</text>
  <text x="48" y="78" class="sub">Plugins extend commands, tools, context, and UI panels through a registry, while permissions and workspace boundaries remain enforced.</text>

  <rect x="40" y="108" width="1080" height="118" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="132" class="layer">PLUGIN INPUT</text>
  <rect x="70" y="156" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="96" y="186" class="label">Manifest</text>
  <rect x="284" y="156" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="312" y="186" class="label">Commands</text>
  <rect x="498" y="156" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="526" y="186" class="label">Tools</text>
  <rect x="712" y="156" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="740" y="186" class="label">Context</text>
  <rect x="926" y="156" width="170" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="954" y="186" class="label">Panels</text>

  <rect x="40" y="282" width="1080" height="154" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="306" class="layer">PLUGIN CORE</text>
  <rect x="84" y="334" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="112" y="358" class="label">Plugin Loader</text>
  <text x="112" y="378" class="sub">read / validate</text>
  <rect x="356" y="334" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="384" y="358" class="label">Plugin Registry</text>
  <text x="384" y="378" class="sub">reload / runtime</text>
  <rect x="628" y="334" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="656" y="358" class="label">Extension Points</text>
  <text x="656" y="378" class="sub">command / tool / panel</text>
  <rect x="900" y="334" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="928" y="358" class="label">Policy Boundary</text>
  <text x="928" y="378" class="sub">permission / consent</text>

  <rect x="40" y="492" width="1080" height="152" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="516" class="layer">PRODUCT SURFACE</text>
  <rect x="70" y="544" width="170" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="96" y="568" class="label">Command Palette</text>
  <text x="96" y="588" class="sub">plugin commands</text>
  <rect x="284" y="544" width="170" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="312" y="568" class="label">Tool Registry</text>
  <text x="312" y="588" class="sub">runtime tools</text>
  <rect x="498" y="544" width="170" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="526" y="568" class="label">Context Prompt</text>
  <text x="526" y="588" class="sub">bounded snippets</text>
  <rect x="712" y="544" width="170" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="740" y="568" class="label">Plugin Panels</text>
  <text x="740" y="588" class="sub">UI slots</text>
  <rect x="926" y="544" width="170" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="954" y="568" class="label">Plugin Manager</text>
  <text x="954" y="588" class="sub">enable / disable</text>

  <rect x="40" y="704" width="1080" height="82" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="728" class="layer">BOUNDARY</text>
  <rect x="128" y="746" width="390" height="36" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="158" y="770" class="label">Plugins do not bypass Runtime tools or sandbox</text>
  <rect x="638" y="746" width="390" height="36" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="668" y="770" class="label">UI panels get scoped APIs, not raw filesystem</text>

  <path d="M155 208 C155 258,179 282,179 334" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M369 208 C369 258,179 282,179 334" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M583 208 C583 258,179 282,179 334" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M797 208 C797 258,179 282,179 334" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M1011 208 C1011 258,723 282,723 334" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M274 365 H356" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M546 365 H628" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M818 365 H900" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M723 396 C723 472,155 476,155 544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M723 396 C723 472,369 476,369 544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M451 396 C451 472,583 476,583 544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M723 396 C723 472,797 476,797 544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M995 396 C995 472,1011 476,1011 544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M369 602 C369 660,323 686,323 746" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M797 602 C797 660,833 686,833 746" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
</svg>
