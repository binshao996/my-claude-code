<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 800" width="1160" height="800">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 24px; font-weight: 700; }
    .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .note { font-size: 12px; fill: #cbd5e1; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1160" height="800" fill="url(#bg-grad)"/>
  <text x="48" y="52" class="title">V3 File Tree</text>
  <text x="48" y="78" class="sub">Workspace root becomes a navigable project tree with ignored-path filtering, search, and open-file intent.</text>

  <rect x="40" y="108" width="1080" height="120" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="132" class="layer">WORKSPACE INPUT</text>
  <rect x="92" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="188" class="label">Workspace.rootPath</text>
  <rect x="412" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="188" class="label">Ignore Rules</text>
  <rect x="732" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="760" y="188" class="label">Project Metadata</text>

  <rect x="40" y="278" width="1080" height="150" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="302" class="layer">FILE TREE CORE</text>
  <rect x="84" y="332" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="112" y="356" class="label">FileTreeService</text>
  <text x="112" y="376" class="sub">scan / stat / sort</text>
  <rect x="358" y="332" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="386" y="356" class="label">IgnoreMatcher</text>
  <text x="386" y="376" class="sub">gitignore / defaults</text>
  <rect x="632" y="332" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="660" y="356" class="label">FileTreeStore</text>
  <text x="660" y="376" class="sub">expanded / selected</text>
  <rect x="906" y="332" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="934" y="356" class="label">SearchIndex</text>
  <text x="934" y="376" class="sub">names / fuzzy later</text>

  <rect x="40" y="484" width="1080" height="146" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="508" class="layer">PRESENTATION AND INTENT</text>
  <rect x="84" y="538" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="112" y="562" class="label">FileTreePanel</text>
  <text x="112" y="582" class="sub">folder / file nodes</text>
  <rect x="358" y="538" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="386" y="562" class="label">SearchBox</text>
  <text x="386" y="582" class="sub">filter / quick open</text>
  <rect x="632" y="538" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="562" class="label">OpenFileIntent</text>
  <text x="660" y="582" class="sub">path / source / preview</text>
  <rect x="906" y="538" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="934" y="562" class="label">Editor Bridge</text>
  <text x="934" y="582" class="sub">V4 target</text>

  <path d="M197 210 V332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M517 210 C517 262,453 278,453 332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M837 210 C837 262,1001 278,1001 332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <path d="M274 363 H358" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M548 363 H632" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M822 363 H906" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M727 394 C727 466,179 466,179 538" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M1001 394 C1001 466,453 466,453 538" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M274 567 H358" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M548 567 H632" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M822 567 H906" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-green)"/>

  <rect x="48" y="688" width="656" height="54" rx="6" fill="#111827" stroke="#334155" stroke-width="1"/>
  <line x1="68" y1="706" x2="100" y2="706" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="112" y="710" class="note">workspace data</text>
  <line x1="260" y1="706" x2="292" y2="706" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="304" y="710" class="note">scan pipeline</text>
  <line x1="68" y1="728" x2="100" y2="728" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="112" y="732" class="note">state update</text>
  <line x1="260" y1="728" x2="292" y2="728" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="304" y="732" class="note">UI and file intent</text>
</svg>
