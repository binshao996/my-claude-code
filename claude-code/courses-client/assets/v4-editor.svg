<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 820" width="1160" height="820">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
    .title { font-size: 24px; font-weight: 700; }
    .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; }
    .label { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; fill: #94a3b8; }
    .note { font-size: 12px; fill: #cbd5e1; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="1160" height="820" fill="url(#bg-grad)"/>
  <text x="48" y="52" class="title">V4 Editor</text>
  <text x="48" y="78" class="sub">OpenFileIntent becomes VS Code-style editor tabs powered by Monaco, with buffers, dirty state, save, and runtime context bridge.</text>

  <rect x="40" y="108" width="1080" height="120" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="132" class="layer">INPUT FROM V3</text>
  <rect x="88" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="118" y="188" class="label">OpenFileIntent</text>
  <rect x="412" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="442" y="188" class="label">Workspace</text>
  <rect x="736" y="158" width="210" height="52" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="766" y="188" class="label">FileTree Path</text>

  <rect x="40" y="278" width="1080" height="154" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="302" class="layer">EDITOR CORE</text>
  <rect x="84" y="332" width="190" height="62" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="112" y="356" class="label">EditorService</text>
  <text x="112" y="376" class="sub">read / save / stat</text>
  <rect x="356" y="332" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="384" y="356" class="label">EditorStore</text>
  <text x="384" y="376" class="sub">tabs / buffers / active</text>
  <rect x="628" y="332" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="656" y="356" class="label">Buffer Model</text>
  <text x="656" y="376" class="sub">content / dirty / version</text>
  <rect x="900" y="332" width="190" height="62" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="928" y="356" class="label">Tab Model</text>
  <text x="928" y="376" class="sub">preview / pinned / close</text>

  <rect x="40" y="490" width="1080" height="142" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="62" y="514" class="layer">PRESENTATION LAYER</text>
  <rect x="84" y="544" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="112" y="568" class="label">EditorLayout</text>
  <text x="112" y="588" class="sub">tabs + editor area</text>
  <rect x="356" y="544" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="384" y="568" class="label">EditorTabs</text>
  <text x="384" y="588" class="sub">active / dirty mark</text>
  <rect x="628" y="544" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="656" y="568" class="label">MonacoEditor</text>
  <text x="656" y="588" class="sub">VS Code editor core</text>
  <rect x="900" y="544" width="190" height="58" rx="6" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="928" y="568" class="label">Status Bar</text>
  <text x="928" y="588" class="sub">language / line / save</text>

  <rect x="40" y="684" width="1080" height="84" rx="10" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="62" y="708" class="layer">RUNTIME BRIDGE</text>
  <rect x="184" y="724" width="230" height="34" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="214" y="746" class="label">current file context</text>
  <rect x="586" y="724" width="230" height="34" rx="6" fill="#1c1917" stroke="#ea580c" stroke-width="1.5"/>
  <text x="616" y="746" class="label">save before agent edit</text>

  <path d="M193 210 V332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M517 210 C517 262,193 274,193 332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M841 210 C841 262,193 274,193 332" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>

  <path d="M274 363 H356" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M546 363 H628" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M818 363 H900" stroke="#a855f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>

  <path d="M451 394 V544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M723 394 V544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M995 394 V544" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M274 573 H356" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M546 573 H628" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M723 602 C723 658,299 664,299 724" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
  <path d="M723 602 C723 658,701 664,701 724" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 5" fill="none" marker-end="url(#arrow-orange)"/>
</svg>
